<style>
:root{
  --bg:#F7F6F2;--s1:#FFFFFF;--s2:#F0EFEA;--s3:#E5E4DC;--s4:#D6D5C8;
  --b0:rgba(85,105,112,0.04);--b1:rgba(85,105,112,0.08);--b2:rgba(85,105,112,0.14);
  --primary:#556970;--primary2:#7A9098;--accent:#ABA944;--cyan:#ABA944;
  --gn:#2d7a4f;--am:#8A8835;--rd:#c0392b;--fi:#ff6b2b;
  --tx:#0F1618;--t2:#3A4347;--t3:#6B7477;
  --sidebar:220px;
  --grad:linear-gradient(135deg,#556970,#3E4F55);
  /* Phantom AI palette retained for reference only */
  --phantom-purple:#5B5FEE;--phantom-accent:#8B5CF6;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;text-rendering:optimizeLegibility}
body{font-family:'Source Serif 4',Georgia,serif;background:var(--bg);color:var(--tx);min-height:100vh;overflow-x:hidden}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--s4);border-radius:2px}
::selection{background:rgba(85,105,112,0.2)}
/* Prevent GSAP from leaving elements invisible */
.ca,.cp,.glass-card,.metric-card,.ag-row{opacity:1!important}
#bgCanvas{opacity:.18!important}

/* ── PICASSO ── */
#bgCanvas{position:fixed;inset:0;z-index:0;pointer-events:none}

/* ── ORBS ── */
.orb{position:fixed;border-radius:50%;filter:blur(100px);pointer-events:none;z-index:0;opacity:.6;animation:orbDrift ease-in-out infinite alternate}
.orb1{width:700px;height:700px;background:radial-gradient(circle,rgba(85,105,112,.1),transparent 70%);top:-200px;left:-150px;animation-duration:18s}
.orb2{width:550px;height:550px;background:radial-gradient(circle,rgba(171,169,68,.08),transparent 70%);bottom:-100px;right:5%;animation-duration:22s;animation-delay:-8s}
.orb3{width:400px;height:400px;background:radial-gradient(circle,rgba(85,105,112,.05),transparent 70%);top:45%;left:45%;animation-duration:16s;animation-delay:-4s}
.orb4{width:350px;height:350px;background:radial-gradient(circle,rgba(171,169,68,.07),transparent 70%);top:20%;right:25%;animation-duration:24s;animation-delay:-12s}
@keyframes orbDrift{0%{transform:translate(0,0) scale(1)}100%{transform:translate(40px,-30px) scale(1.08)}}

/* ── LIQUID GLASS ── */
.glass{background:rgba(255,255,255,.85);backdrop-filter:blur(20px) saturate(140%);-webkit-backdrop-filter:blur(20px) saturate(140%);border:0.5px solid rgba(85,105,112,.14)}
.glass-card{background:linear-gradient(135deg,rgba(255,255,255,.95),rgba(255,255,255,.80));backdrop-filter:blur(24px) saturate(160%);-webkit-backdrop-filter:blur(24px) saturate(160%);border:0.5px solid rgba(85,105,112,.16);border-radius:14px;transition:all .25s ease;position:relative;overflow:hidden}
.glass-card::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.5) 0%,transparent 60%);pointer-events:none;border-radius:inherit}
.glass-card:hover{background:linear-gradient(135deg,rgba(255,255,255,.98),rgba(255,255,255,.88));border-color:rgba(85,105,112,.3);transform:translateY(-2px);box-shadow:0 20px 60px rgba(0,0,0,.45),0 0 1px rgba(255,255,255,.06) inset}
.glass-card.no-hover:hover{transform:none;box-shadow:none}

/* ── LOGO CIRCLE ── */
.logo-ring{border-radius:50%;overflow:hidden;flex-shrink:0;position:relative}
.logo-ring::after{content:'';position:absolute;inset:0;border-radius:50%;border:2px solid transparent;background:linear-gradient(135deg,#ABA944,#556970,#3E4F55) border-box;-webkit-mask:linear-gradient(#fff 0 0) padding-box,linear-gradient(#fff 0 0);-webkit-mask-composite:destination-out;mask-composite:exclude;animation:ringPulse 3s ease-in-out infinite;pointer-events:none}
.logo-ring img{width:100%;height:100%;object-fit:cover;border-radius:50%;display:block}
@keyframes ringPulse{0%,100%{box-shadow:0 0 0 0 transparent,0 0 18px rgba(171,169,68,.35)}50%{box-shadow:0 0 0 3px rgba(85,105,112,.2),0 0 24px rgba(171,169,68,.5)}}

/* ── GRADIENT TEXT ── */
.grad-text{background:linear-gradient(135deg,#556970 0%,#ABA944 60%,#8A8835 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}

/* ── BUTTONS ── */
.btn-primary{background:linear-gradient(135deg,#3E4F55,#556970);border:none;border-radius:10px;padding:.7rem 1.2rem;color:#fff;font-size:13.5px;font-weight:600;cursor:pointer;box-shadow:0 4px 16px rgba(85,105,112,.35),0 1px 0 rgba(255,255,255,.2) inset;transition:all .2s;position:relative;overflow:hidden;font-family:'Source Serif 4',Georgia,serif}
.btn-primary::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.15),transparent);pointer-events:none}
.btn-primary:hover{box-shadow:0 8px 28px rgba(85,105,112,.5);transform:translateY(-1px)}
.btn-primary:active{transform:translateY(0);box-shadow:0 3px 10px rgba(85,105,112,.3)}
.btn-ghost{background:none;border:0.5px solid rgba(85,105,112,.2);border-radius:9px;padding:.45rem .9rem;color:var(--tx);font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;font-family:'Source Serif 4',Georgia,serif}
.btn-ghost:hover{border-color:rgba(255,255,255,.28);background:rgba(255,255,255,.05)}
.btn-solid{background:var(--tx);border:none;border-radius:9px;padding:.45rem .9rem;color:var(--bg);font-size:13px;font-weight:700;cursor:pointer;transition:opacity .15s;font-family:'Source Serif 4',Georgia,serif}
.btn-solid:hover{opacity:.88}

/* ── FIELDS ── */
.field{background:rgba(255,255,255,.85);border:0.5px solid rgba(85,105,112,.2);border-radius:10px;padding:.65rem .9rem;color:var(--tx);font-size:13.5px;outline:none;width:100%;transition:border-color .2s,box-shadow .2s;font-family:'Source Serif 4',Georgia,serif}
.field:focus{border-color:rgba(85,105,112,.5);box-shadow:0 0 0 3px rgba(85,105,112,.1)}
.field::placeholder{color:var(--t3)}
textarea.field{resize:none;line-height:1.6}

/* ── SIDEBAR ── */
#sidebar{position:fixed;top:0;left:0;bottom:0;z-index:50;display:flex;flex-direction:column;background:rgba(255,255,255,.97);backdrop-filter:blur(28px);-webkit-backdrop-filter:blur(28px);border-right:0.5px solid rgba(85,105,112,.14);transition:width .22s cubic-bezier(.4,0,.2,1);overflow:hidden}
.sb-item{display:flex;align-items:center;gap:.5rem;padding:.48rem .75rem;border-radius:9px;font-size:13px;font-weight:500;color:var(--t2);border:none;cursor:pointer;width:100%;text-align:left;transition:all .15s;background:none;position:relative;font-family:'Source Serif 4',Georgia,serif;white-space:nowrap}
.sb-item:hover{color:var(--tx);background:rgba(85,105,112,.06)}
.sb-item.active{color:var(--tx);background:rgba(85,105,112,.10)}
.sb-item.active::before{content:'';position:absolute;left:0;top:22%;bottom:22%;width:2.5px;background:linear-gradient(180deg,#ABA944,#556970,#3E4F55);border-radius:0 2px 2px 0}
.sb-icon{font-size:14px;width:18px;text-align:center;flex-shrink:0;line-height:1}
.sb-item.active .sb-icon,.sb-item:hover .sb-icon{opacity:1}
.sb-collapsed .sb-item{justify-content:center;padding:9px 0;width:100%}
.sb-collapsed .sb-item .sb-icon{width:auto;margin:0}

/* ── MAIN ── */
#main{margin-left:var(--sidebar);min-height:100vh;position:relative;z-index:1}
#topbar{position:sticky;top:0;z-index:40;background:rgba(247,246,242,.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:0.5px solid rgba(85,105,112,.12);padding:.7rem 1.5rem;display:flex;align-items:center;justify-content:space-between}

/* ── STATUS PILLS ── */
.pill{font-size:10px;padding:2px 8px;border-radius:100px;font-weight:600;letter-spacing:.04em}
.pill-on{background:rgba(45,122,79,.1);color:#2d7a4f;border:0.5px solid rgba(45,122,79,.2)}
.pill-sb{background:rgba(85,105,112,.1);color:#556970;border:0.5px solid rgba(85,105,112,.2)}
.pill-q{background:rgba(245,158,11,.12);color:#fbbf24;border:0.5px solid rgba(245,158,11,.25)}
.pill-p{background:rgba(239,68,68,.12);color:#f87171;border:0.5px solid rgba(239,68,68,.25)}
.pill-badge{font-size:11px;padding:3px 10px;border-radius:100px;font-weight:500;border:0.5px solid}
.badge-p{background:rgba(171,169,68,.1);border-color:rgba(171,169,68,.3);color:#8A8835}
.badge-g{background:rgba(45,122,79,.08);border-color:rgba(45,122,79,.2);color:#2d7a4f;display:flex;align-items:center;gap:5px}

/* ── PULSE DOT ── */
.pulse-dot{width:7px;height:7px;border-radius:50%;background:var(--gn);box-shadow:0 0 8px var(--gn);animation:pdot 2.5s ease-in-out infinite}
@keyframes pdot{0%,100%{opacity:1;box-shadow:0 0 8px var(--gn)}50%{opacity:.4;box-shadow:0 0 3px var(--gn)}}

/* ── HOME INPUT ── */
.home-box{background:rgba(255,255,255,.9);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border:0.5px solid rgba(85,105,112,.2);border-radius:16px;overflow:hidden;transition:border-color .2s,box-shadow .2s}
.home-box:focus-within{border-color:rgba(85,105,112,.45);box-shadow:0 0 0 3px rgba(85,105,112,.08)}
.home-ta{display:block;width:100%;background:none;border:none;outline:none;padding:1rem 1.25rem .75rem;color:var(--tx);font-size:14.5px;resize:none;min-height:64px;line-height:1.6;font-family:'Source Serif 4',Georgia,serif}
.home-ta::placeholder{color:var(--t3)}
.hq-btn{background:rgba(255,255,255,.04);border:0.5px solid rgba(255,255,255,.09);border-radius:8px;padding:.35rem .75rem;font-size:12px;font-weight:500;color:var(--t2);cursor:pointer;transition:all .15s;font-family:'Source Serif 4',Georgia,serif}
.hq-btn:hover{background:rgba(85,105,112,.1);border-color:rgba(85,105,112,.3);color:var(--tx)}

/* ── METRIC CARD ── */
.metric-card{border-radius:14px;padding:1.125rem;background:rgba(255,255,255,.95);box-shadow:0 1px 4px rgba(85,105,112,.1);backdrop-filter:blur(20px);border:0.5px solid rgba(255,255,255,.09);cursor:pointer;transition:all .22s;overflow:hidden;position:relative}
.metric-card::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(171,169,68,.5),transparent);opacity:0;transition:opacity .3s}
.metric-card:hover::after{opacity:1}
.metric-card:hover{transform:translateY(-3px);box-shadow:0 24px 50px rgba(0,0,0,.45);border-color:rgba(255,255,255,.16)}

/* ── AGENT GRID ── */
.ag-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(295px,1fr));gap:.5rem;margin-bottom:1rem}
.ag-row{background:linear-gradient(135deg,rgba(255,255,255,.9),rgba(255,255,255,.7));border:0.5px solid rgba(85,105,112,.12);border-radius:11px;padding:.72rem 1rem;display:flex;align-items:center;gap:.72rem;cursor:pointer;transition:all .18s;position:relative;overflow:hidden}
.ag-row::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.04),transparent);pointer-events:none}
.ag-row:hover{border-color:rgba(85,105,112,.4);background:linear-gradient(135deg,rgba(85,105,112,.08),rgba(85,105,112,.03));transform:translateX(2px);box-shadow:0 8px 24px rgba(0,0,0,.3)}

/* ── CHAT ── */
.bubble-u{background:linear-gradient(135deg,rgba(85,105,112,.14),rgba(85,105,112,.07));border:0.5px solid rgba(85,105,112,.25);border-radius:14px 14px 3px 14px;padding:.65rem .9rem;font-size:13.5px;line-height:1.65}
.bubble-a{background:linear-gradient(135deg,rgba(255,255,255,.95),rgba(255,255,255,.8));border:0.5px solid rgba(85,105,112,.15);border-radius:14px 14px 14px 3px;padding:.65rem .9rem;font-size:13.5px;line-height:1.65}
.msg-wrap:hover .msg-acts{opacity:1;transform:translateY(0)}
.msg-acts{opacity:0;transform:translateY(4px);transition:all .18s;display:flex;gap:4px}
.act-btn{background:rgba(255,255,255,.05);border:0.5px solid rgba(255,255,255,.1);border-radius:6px;padding:2px 8px;font-size:11px;color:var(--t2);cursor:pointer;transition:all .12s;font-family:'Source Serif 4',Georgia,serif}
.act-btn:hover{border-color:rgba(255,255,255,.2);color:var(--tx);background:rgba(255,255,255,.09)}

/* ── TYPING ── */
.typing-dot{width:6px;height:6px;border-radius:50%;background:var(--t2);display:inline-block;animation:typ 1.4s infinite both}
.typing-dot:nth-child(2){animation-delay:.2s}.typing-dot:nth-child(3){animation-delay:.4s}
@keyframes typ{0%,80%,100%{opacity:.15;transform:scale(1)}40%{opacity:1;transform:scale(1.3)}}

/* ── ROUTINES ── */
.rt-item{display:flex;align-items:center;gap:.625rem;padding:.45rem .75rem;border-radius:8px;font-size:12.5px;color:var(--t2);cursor:pointer;transition:all .15s;font-weight:500}
.rt-item:hover{background:rgba(255,255,255,.05);color:var(--tx)}
.rt-item.active{background:rgba(85,105,112,.1);color:var(--tx)}
.rt-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}

/* ── TOGGLE ── */
.toggle-track{position:relative;width:38px;height:21px;cursor:pointer;background:var(--s4);border-radius:100px;border:0.5px solid rgba(255,255,255,.12);transition:background .2s}
.toggle-track.on{background:linear-gradient(135deg,#3E4F55,#556970)}
.toggle-thumb{position:absolute;width:15px;height:15px;border-radius:50%;background:#fff;top:3px;left:3px;transition:left .2s;box-shadow:0 1px 4px rgba(0,0,0,.3)}
.toggle-track.on .toggle-thumb{left:20px}

/* ── TRIG OPT ── */
.trig-opt{background:rgba(255,255,255,.03);border:0.5px solid rgba(255,255,255,.08);border-radius:10px;padding:.875rem 1rem;margin-bottom:.5rem;cursor:pointer;display:flex;align-items:flex-start;gap:.75rem;transition:all .2s}
.trig-opt:hover,.trig-opt.sel{border-color:rgba(85,105,112,.4);background:rgba(85,105,112,.06)}

/* ── DATA TABLE ── */
.dt{width:100%;border-collapse:collapse}
.dt th{background:rgba(255,255,255,.03);padding:.65rem 1rem;text-align:left;font-weight:600;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--t3);border-bottom:.5px solid rgba(255,255,255,.06)}
.dt td{padding:.7rem 1rem;border-bottom:.5px solid rgba(255,255,255,.04);color:var(--t2);font-size:13px;vertical-align:middle}
.dt tr:hover td{background:rgba(255,255,255,.025)}
.dt tr:last-child td{border-bottom:none}

/* ── SKILL ROW / CONN ROW ── */
.panel-row{display:flex;align-items:center;gap:.625rem;padding:.45rem .75rem;border-radius:8px;font-size:12.5px;color:var(--t2);cursor:pointer;transition:all .12s;font-weight:500;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.panel-row:hover{background:rgba(85,105,112,.08);color:var(--tx)}
.panel-row.active{background:rgba(85,105,112,.12);color:var(--tx)}
.panel-ico{width:22px;height:22px;border-radius:6px;background:rgba(85,105,112,.12);border:0.5px solid rgba(85,105,112,.2);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#9398ff;flex-shrink:0}

/* ── TOAST ── */
#toast{position:fixed;bottom:1.5rem;right:1.5rem;background:rgba(12,16,36,.95);backdrop-filter:blur(20px);border:.5px solid rgba(255,255,255,.14);border-radius:10px;padding:.65rem 1.1rem;font-size:13px;color:var(--tx);z-index:9999;display:none;box-shadow:0 16px 40px rgba(0,0,0,.5);animation:toastIn .25s cubic-bezier(0.16,1,0.3,1)}
@keyframes toastIn{from{transform:translateY(12px) scale(.97);opacity:0}to{transform:translateY(0) scale(1);opacity:1}}

/* ── VIEW OVERLAY ── */
#overlay{position:fixed;inset:0;background:rgba(5,7,14,.5);z-index:200;pointer-events:none;opacity:0}

/* ── SECTION LABEL ── */
.sec-lbl{font-size:10px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--t3);margin:.875rem 0 .625rem}

/* ── DESIGN TYPES ── */
.type-card{border:0.5px solid rgba(255,255,255,.09);border-radius:11px;padding:.75rem;cursor:pointer;transition:all .15s;background:rgba(255,255,255,.03);text-align:center}
.type-card:hover{border-color:rgba(85,105,112,.35)}
.type-card.sel{border-color:rgba(85,105,112,.6);background:rgba(85,105,112,.1)}
.type-preview{height:54px;border-radius:6px;margin-bottom:.5rem;display:flex;align-items:center;justify-content:center;font-size:20px;color:rgba(255,255,255,.25)}

/* ── MANUAL TOC ── */
.toc-item{display:flex;align-items:center;gap:.625rem;padding:.45rem .75rem;border-radius:8px;font-size:12.5px;color:var(--t2);cursor:pointer;transition:all .15s;font-weight:500;margin-bottom:2px}
.toc-item:hover{background:rgba(255,255,255,.05);color:var(--tx)}
.toc-item.active{background:rgba(85,105,112,.1);color:var(--tx)}

/* ── SPLIT SCREEN PREVIEW PANEL ── */
#main{
  transition: margin-right .22s cubic-bezier(.4,0,.2,1);
}
.preview-panel{
  position:fixed;top:0;right:0;bottom:0;
  background:var(--surface);
  border-left:.5px solid rgba(85,105,112,.18);
  display:flex;flex-direction:column;
  z-index:90;
  box-shadow:-4px 0 24px rgba(85,105,112,.1);
  transition:transform .22s cubic-bezier(.4,0,.2,1);
}
.preview-panel.closed{transform:translateX(100%)}
.preview-panel.open{transform:translateX(0)}
.preview-topbar{
  height:48px;min-height:48px;
  display:flex;align-items:center;gap:10px;
  padding:0 1rem;
  border-bottom:.5px solid rgba(85,105,112,.12);
  background:rgba(255,255,255,.95);
  flex-shrink:0;
}
.preview-title{font-family:'Agdasima',sans-serif;font-size:14px;font-weight:700;color:var(--tx);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.preview-body{flex:1;overflow:hidden;position:relative}
.preview-body iframe{width:100%;height:100%;border:none;background:#fff}
.preview-body .code-view{padding:1rem;overflow:auto;height:100%;font-family:'Fira Code',monospace;font-size:12px;line-height:1.7;color:var(--tx);background:var(--off-white)}
.preview-drag{
  position:absolute;left:-3px;top:0;bottom:0;width:6px;
  cursor:col-resize;z-index:91;
  background:transparent;
  transition:background .15s;
}
.preview-drag:hover,.preview-drag.dragging{background:rgba(85,105,112,.25)}
.preview-tabs{display:flex;gap:2px;padding:0 .75rem}
.preview-tab{font-family:'Fira Code',monospace;font-size:10px;padding:4px 10px;border-radius:5px 5px 0 0;border:none;background:none;color:var(--t3);cursor:pointer;transition:all .15s}
.preview-tab.active{background:var(--surface);color:var(--primary);border-bottom:2px solid var(--primary)}
.split-toggle{
  position:fixed;right:0;top:50%;transform:translateY(-50%);
  width:20px;height:56px;
  background:rgba(85,105,112,.15);
  border:none;border-radius:6px 0 0 6px;
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  z-index:92;color:var(--t2);
  transition:all .2s;
  backdrop-filter:blur(8px);
}
.split-toggle:hover{background:rgba(85,105,112,.3);width:24px}
.preview-badge{
  position:absolute;top:-5px;right:-5px;
  width:16px;height:16px;border-radius:50%;
  background:var(--olive);color:#fff;
  font-size:8px;font-family:'Fira Code',monospace;
  display:flex;align-items:center;justify-content:center;
  font-weight:700;
}
.preview-empty{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  height:100%;gap:1rem;padding:2rem;text-align:center;
}
.preview-empty-icon{font-size:36px;opacity:.25}
.preview-empty-text{font-size:13.5px;color:var(--t2);font-family:'Source Serif 4',serif;line-height:1.7;font-weight:500}
.preview-empty-hint{font-size:11.5px;color:var(--t3);font-family:'Fira Code',monospace;font-weight:500}
@media(max-width:900px){
  .preview-panel{width:100%!important;top:auto;height:50vh}
  .preview-drag{display:none}
}

*{scroll-behavior:smooth}
@keyframes pageIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.page-animate{animation:pageIn .25s cubic-bezier(.4,0,.2,1) both}
@keyframes probePulse{0%,100%{box-shadow:0 0 0 0 rgba(132,204,22,.4)}50%{box-shadow:0 0 0 4px rgba(132,204,22,.1)}}
@keyframes activePulse{0%,100%{opacity:1}50%{opacity:.7}}
@keyframes spin{to{transform:rotate(360deg)}}
.panel-row:hover .del-btn{opacity:1!important}
div:hover .del-btn{opacity:1!important}
</style>
</head>

<canvas id="bgCanvas"></canvas>
<div class="orb orb1"></div>
<div class="orb orb2"></div>
<div class="orb orb3"></div>

<div id="root"></div>
<div id="toast"></div>

<script type="text/babel">

/* ── PICASSO PARTICLES ── */
const initCanvas = () => {
  const cv = document.getElementById('bgCanvas');
  const ctx = cv.getContext('2d');
  let W, H, pts = [], frame = 0;
  const resize = () => { W = cv.width = window.innerWidth; H = cv.height = window.innerHeight; };
  resize(); window.addEventListener('resize', resize);
  for (let i = 0; i < 70; i++) pts.push({ x:Math.random()*1920, y:Math.random()*1080, vx:(Math.random()-.5)*.25, vy:(Math.random()-.5)*.25, r:Math.random()*1.4+.3, hue:90+Math.random()*50, life:Math.random()*Math.PI*2 });
  const tick = () => {
    ctx.clearRect(0, 0, W, H); frame++;
    pts.forEach((p,i) => {
      p.life += .007; p.x += p.vx+Math.sin(p.life*.6)*.14; p.y += p.vy+Math.cos(p.life*.4)*.11;
      if(p.x<0)p.x=W; if(p.x>W)p.x=0; if(p.y<0)p.y=H; if(p.y>H)p.y=0;
      const a=(Math.sin(p.life)*.5+.5)*.3;
      ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle='hsl('+p.hue+',75%,72%)'; ctx.globalAlpha=a; ctx.fill();
      for(let j=i+1;j<pts.length;j++){
        const q=pts[j],dx=p.x-q.x,dy=p.y-q.y,d=Math.sqrt(dx*dx+dy*dy);
        if(d<110){ ctx.beginPath(); ctx.moveTo(p.x,p.y); ctx.lineTo(q.x,q.y); ctx.strokeStyle='hsl(100,35%,55%)'; ctx.globalAlpha=(1-d/110)*.07; ctx.lineWidth=.5; ctx.stroke(); }
      }
    }); ctx.globalAlpha=1; requestAnimationFrame(tick);
  }; tick();
};

/* ── AGENT CHAT — Clean, no pill clutter ── */
const AgentChat = ({ selAgent, setSA, openPreview }) => {
  const [msgs, setMsgs] = useState([]);
  const [input, setInput] = useState('');
  const [loading, setLoading] = useState(false);
  const [attachedImgs, setAttachedImgs] = useState([]);
  const [switcherOpen, setSwitcherOpen] = useState(false);
  const bottomRef = useRef(); const fileRef = useRef();
  const ag = AGENTS[selAgent];

  useEffect(()=>{
    setMsgs([{type:'agent',text:'Agent '+ag.n+' active. Ask anything — I respond from my full intelligence DNA. You can paste, drop or attach any image and I will read, analyse and fix it at NEXUS + PROBE standard. What needs solving today?',time:now()}]);
    setAttachedImgs([]);
    setSwitcherOpen(false);
  },[selAgent]);

  useEffect(()=>{ bottomRef.current?.scrollIntoView({behavior:'smooth'}); },[msgs]);

  const fileToB64 = (file) => new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res({dataUrl:r.result,mediaType:file.type,name:file.name||'image'});r.onerror=rej;r.readAsDataURL(file);});
  const addFiles = async (files) => {
    const allowed=['image/jpeg','image/png','image/gif','image/webp'];
    const valid=[...files].filter(f=>allowed.includes(f.type)).slice(0,4);
    if(!valid.length) return;
    const loaded = await Promise.all(valid.map(fileToB64));
    setAttachedImgs(prev=>[...prev,...loaded].slice(0,4));
  };
  const handlePaste = async (e) => {
    const items=[...e.clipboardData.items];
    const imgItems=items.filter(it=>it.type.startsWith('image/'));
    if(imgItems.length){e.preventDefault();await addFiles(imgItems.map(it=>it.getAsFile()).filter(Boolean));}
  };

  const send = async () => {
    if((!input.trim()&&attachedImgs.length===0)||loading) return;
    const txt=input.trim(); setInput('');
    const imgs=[...attachedImgs]; setAttachedImgs([]);
    const apiUserContent=[];
    imgs.forEach(img=>{apiUserContent.push({type:'image',source:{type:'base64',media_type:img.mediaType,data:img.dataUrl.split(',')[1]}});});
    if(txt) apiUserContent.push({type:'text',text:txt});
    const userMsg={type:'user',text:txt||(imgs.length+' image'+(imgs.length>1?'s':'')+' attached'),time:now(),imgs};
    const h=[...msgs,userMsg];
    setMsgs(h); setLoading(true);
    try {
      const ep = window.__phoennixConfig?.endpoint;
      const apiKey = window.__phoennixConfig?.anthropic;
      const sys='You are '+ag.n+', PhoennixAI '+ag.r+'. DNA: '+ag.dna+'\n\nContext: PhoennixAI (double-N always). Founder: Valerie Wilcox. 31 agents, 5 tiers. Brand: slate #556970, olive #ABA944.\nWhen given an image: read ALL text visible, identify ALL UI elements, diagnose ALL bugs precisely, give exact code fix.\nAlways end with one clear next action. Plain text only.';
      const apiHistory = h.filter(m=>m.type!=='typing').map(m=>{
        if(m.type==='user'){
          const c=[];
          (m.imgs||[]).forEach(img=>c.push({type:'image',source:{type:'base64',media_type:img.mediaType,data:img.dataUrl.split(',')[1]}}));
          if(m.text&&!m.text.match(/^\d+ images? attached$/)) c.push({type:'text',text:m.text});
          return {role:'user',content:c.length?c:[{type:'text',text:m.text||'(image)'}]};
        }
        return {role:'assistant',content:m.text};
      });
      apiHistory[apiHistory.length-1]={role:'user',content:apiUserContent};
      let res, data;
      if(ep){
        res=await fetch(ep,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({messages:apiHistory,agentName:ag.n})});
        data=await res.json();
      } else if(apiKey){
        res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':apiKey,'anthropic-version':'2023-06-01'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:2000,system:sys,messages:apiHistory})});
        data=await res.json();
      } else {
        setMsgs(m=>[...m,{type:'agent',text:'No API connected yet. Go to Customize → API Config → paste your Vercel endpoint URL and save. Or add your Anthropic API key directly.',time:now()}]);
        setLoading(false); return;
      }
      let reply=(data.content?.filter(b=>b.type==='text').map(b=>b.text).join('\n')||data.error?.message||'No response').replace(/\*\*/g,'').replace(/---/g,'').replace(/—/g,' - ');
      setMsgs(m=>[...m,{type:'agent',text:reply,time:now()}]);
      const htmlMatch = reply.match(/<!DOCTYPE html>[\s\S]*<\/html>/i)||reply.match(/<html[\s\S]*<\/html>/i);
      const codeMatch = reply.match(new RegExp('\x60\x60\x60(?:html|jsx|tsx|js|ts|css)\\n([\\s\\S]+?)\x60\x60\x60'));
      if(htmlMatch&&openPreview) openPreview(htmlMatch[0],'html',ag.n+' — Generated output');
      else if(codeMatch&&openPreview) openPreview(codeMatch[1],'code',ag.n+' — Code output');
    } catch(err) {
      setMsgs(m=>[...m,{type:'agent',text:'Connection error: '+err.message+'. Check your API config in Customize.',time:now()}]);
    }
    setLoading(false);
  };

  return (
    <div style={{display:'flex',flexDirection:'column',height:'calc(100vh - 49px)',overflow:'hidden'}} onClick={()=>setSwitcherOpen(false)}>

      {/* Clean agent header — no pill clutter */}
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'.75rem 1.5rem',borderBottom:'.5px solid rgba(85,105,112,.12)',flexShrink:0,background:'rgba(255,255,255,.95)'}}>
        <div style={{display:'flex',alignItems:'center',gap:10,position:'relative'}}>
          <div style={{width:10,height:10,borderRadius:'50%',background:ag.c,boxShadow:'0 0 8px '+ag.c+'80'}}></div>
          <div>
            <div style={{fontFamily:'Agdasima,sans-serif',fontSize:16,letterSpacing:'1px',fontWeight:700,color:'var(--tx)'}}>{ag.n}</div>
            <div style={{fontFamily:'Fira Code,monospace',fontSize:9.5,color:'var(--t3)'}}>{ag.r}</div>
          </div>
          {/* Compact switcher button */}
          <button onClick={e=>{e.stopPropagation();setSwitcherOpen(o=>!o);}}
            style={{display:'flex',alignItems:'center',gap:4,padding:'4px 9px',border:'.5px solid rgba(85,105,112,.2)',borderRadius:6,background:'none',cursor:'pointer',fontFamily:'Fira Code,monospace',fontSize:10,color:'var(--t3)',marginLeft:4,transition:'all .15s'}}
            onMouseOver={e=>e.currentTarget.style.background='rgba(85,105,112,.06)'}
            onMouseOut={e=>e.currentTarget.style.background='none'}>
            Switch agent <svg width="9" height="9" viewBox="0 0 9 9" fill="none" stroke="currentColor" strokeWidth="1.5"><path d="M1.5 3.5l3 3 3-3"/></svg>
          </button>

          {/* Agent switcher dropdown */}
          {switcherOpen&&(
            <div style={{position:'absolute',top:'calc(100% + 8px)',left:0,background:'#fff',border:'1px solid rgba(85,105,112,.15)',borderRadius:12,boxShadow:'0 8px 32px rgba(85,105,112,.14)',zIndex:200,width:280,maxHeight:340,overflowY:'auto'}} onClick={e=>e.stopPropagation()}>
              <div style={{padding:'7px 12px 5px',fontFamily:'Fira Code,monospace',fontSize:8.5,letterSpacing:'2px',textTransform:'uppercase',color:'var(--t3)',borderBottom:'.5px solid rgba(85,105,112,.1)',position:'sticky',top:0,background:'#fff'}}>Select Agent</div>
              {AGENTS.map((a,i)=>(
                <div key={a.n} onClick={()=>{setSA(i);setSwitcherOpen(false);}}
                  style={{padding:'9px 12px',cursor:'pointer',display:'flex',alignItems:'center',gap:9,background:i===selAgent?'rgba(85,105,112,.05)':'transparent',transition:'background .1s'}}
                  onMouseOver={e=>e.currentTarget.style.background='rgba(85,105,112,.04)'}
                  onMouseOut={e=>e.currentTarget.style.background=i===selAgent?'rgba(85,105,112,.05)':'transparent'}>
                  <div style={{width:8,height:8,borderRadius:'50%',background:a.c,flexShrink:0}}></div>
                  <div style={{flex:1}}>
                    <div style={{fontSize:12.5,fontWeight:600,color:'var(--tx)'}}>{a.n}</div>
                    <div style={{fontFamily:'Fira Code,monospace',fontSize:9.5,color:'var(--t3)'}}>{a.r}</div>
                  </div>
                  {i===selAgent&&<svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="#556970" strokeWidth="2.5"><path d="M2 6l3 3 5-5"/></svg>}
                </div>
              ))}
            </div>
          )}
        </div>
        <div style={{fontFamily:'Fira Code,monospace',fontSize:10,color:'var(--t3)',display:'flex',alignItems:'center',gap:4}}>
          <span style={{width:6,height:6,borderRadius:'50%',background:ag.c,display:'inline-block'}}></span>
          ONLINE
        </div>
      </div>

      {/* Messages */}
      <div style={{flex:1,overflowY:'auto',padding:'1rem 1.5rem',display:'flex',flexDirection:'column',gap:'.75rem',maxWidth:820,width:'100%',alignSelf:'center'}} onDrop={e=>{e.preventDefault();if(e.dataTransfer.files.length)addFiles(e.dataTransfer.files);}} onDragOver={e=>e.preventDefault()}>
        {msgs.map((m,i)=>(
          <div key={i} className="msg-wrap" style={{display:'flex',flexDirection:'column',alignItems:m.type==='user'?'flex-end':'flex-start',gap:4}}>
            {m.type==='agent'&&<div style={{fontSize:10,color:'var(--t3)',fontFamily:'Fira Code,monospace',display:'flex',alignItems:'center',gap:5}}>
              <span style={{width:6,height:6,borderRadius:'50%',background:ag.c,display:'inline-block'}}></span>{ag.n} — {m.time}
            </div>}
            <div className={m.type==='user'?'bubble-u':'bubble-a'} style={{maxWidth:'82%'}}>
              {(m.imgs||[]).length>0&&<div style={{display:'flex',gap:6,flexWrap:'wrap',marginBottom:(m.imgs||[]).length&&m.text?8:0}}>
                {(m.imgs||[]).map((img,j)=><img key={j} src={img.dataUrl} alt="attached" style={{maxWidth:200,maxHeight:140,borderRadius:7,objectFit:'cover',border:'0.5px solid rgba(85,105,112,.25)'}}/>)}
              </div>}
              {m.text&&m.text.split('\n').map((ln,j)=><div key={j}>{ln||<br/>}</div>)}
            </div>
            <div className="msg-acts" style={{justifyContent:m.type==='user'?'flex-end':'flex-start'}}>
              {m.type==='user'&&<span style={{fontSize:10,color:'var(--t3)',paddingRight:4,fontFamily:'Fira Code,monospace'}}>{m.time}</span>}
              <button className="act-btn" onClick={()=>navigator.clipboard.writeText(m.text||'').then(()=>toast('Copied'))}>Copy</button>
              {m.type==='agent'&&<button className="act-btn" onClick={send}>Refresh</button>}
            </div>
          </div>
        ))}
        {loading&&<div className="bubble-a" style={{maxWidth:'80%',display:'flex',gap:5,padding:'.75rem'}}>{[0,1,2].map(i=><span key={i} className="typing-dot" style={{animationDelay:i*.2+'s'}}></span>)}</div>}
        <div ref={bottomRef}/>
      </div>

      {/* Attached images */}
      {attachedImgs.length>0&&(
        <div style={{display:'flex',gap:8,padding:'.375rem 1.5rem',borderTop:'.5px solid rgba(85,105,112,.1)',maxWidth:820,width:'100%',alignSelf:'center',flexWrap:'wrap',alignItems:'flex-end',background:'rgba(255,255,255,.8)'}}>
          {attachedImgs.map((img,i)=>(
            <div key={i} style={{position:'relative'}}>
              <img src={img.dataUrl} alt="" style={{height:52,width:68,objectFit:'cover',borderRadius:6,border:'1px solid rgba(85,105,112,.2)'}}/>

            </div>
          ))}
          <span style={{fontSize:11,color:'var(--t2)',fontFamily:'Fira Code,monospace'}}>{attachedImgs.length} image{attachedImgs.length>1?'s':''} ready</span>

        <div style={{background:'rgba(255,255,255,.94)',border:'.5px solid rgba(85,105,112,.2)',borderRadius:12,overflow:'hidden',boxShadow:'0 1px 6px rgba(85,105,112,.08)',transition:'border-color .2s,box-shadow .2s'}}>

              {loading?'Thinking…':'Send'} {!loading&&<svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" strokeWidth="2"><path d="M2 10L10 2M4 2h6v6" strokeLinecap="round"/></svg>}
            </button>
          </div>
        </div>
      </div>
    </div>
  );
};
/* ── ROUTINES ── */
const Routines = () => {
  const [sel,setSel]=useState(0); const [nr,setNR]=useState(false); const [trig,setTrig]=useState(0);
  const [cronVals,setCronVals]=useState({min:'0',hr:'7',day:'*',mon:'*',wd:'1-5'});
  const [apiKey,setApiKey]=useState(window.__phoennixConfig?.anthropic||'');
  const [endpoint,setEndpoint]=useState(window.__phoennixConfig?.endpoint||'');
  const [showApiGuide,setShowApiGuide]=useState(false);
  const [routineRunning,setRoutineRunning]=useState(false);
  const [liveOutput,setLiveOutput]=useState('');
  const r=ROUTINES[sel];

  const cronToHuman = (c) => {
    const cronPresets = {
      '0 7 * * 1-5':'Weekdays at 07:00','0 8 * * 1-5':'Weekdays at 08:00',
      '0 8,13,17 * * *':'Daily at 08:00, 13:00 & 17:00','30 10 * * 1-5':'Weekdays at 10:30',
      '0 13 * * *':'Daily at 13:00','30 16 * * 1-5':'Weekdays at 16:30',
      '0 9 * * 1':'Every Monday at 09:00','0 19 * * 1-5':'Weekdays at 19:00',
    };
    const expr = c.min+' '+c.hr+' '+c.day+' '+c.mon+' '+c.wd;
    return cronPresets[expr]||('Custom: '+expr);
  };

  const runRoutineNow = async () => {
    const ep = endpoint||window.__phoennixConfig?.endpoint;
    if(!ep){ toast('Set your Vercel endpoint in Customize → API Config first'); return; }
    setRoutineRunning(true); setLiveOutput('');
    const rKey = window.__phoennixConfig?.routineSecret||'';
    try{
      const res = await fetch(ep, {
        method:'POST',
        headers:{'Content-Type':'application/json','X-Routine-Key':rKey},
        body:JSON.stringify({routine:r.name.toLowerCase().replace(/ /g,'-')})
      });
      const data = await res.json();
      setLiveOutput(data.output||data.error||'No output returned');
      toast(r.name+' completed');
    }catch(e){ setLiveOutput('Connection error: '+e.message); toast('Run failed — check endpoint'); }
    setRoutineRunning(false);
  };

  const copyCurl = () => {
    const ep = endpoint||'https://your-project.vercel.app/api/claude';
    const secret = window.__phoennixConfig?.routineSecret||'your-routine-secret';
    const routineKey = r.name.toLowerCase().replace(/ /g,'-');
    const part1 = "curl -X POST " + ep; const part2 = " -H Content-Type:application/json -H X-Routine-Key:" + secret; const part3 = " -d routine=" + routineKey; const cmd = part1 + part2 + part3;
    navigator.clipboard.writeText(cmd).then(()=>toast('cURL command copied'));
  };

  return (

          <div style={{fontSize:13,fontWeight:600}}>⚡ Routines</div>
          <button onClick={()=>setNR(true)} style={{width:24,height:24,borderRadius:'50%',border:'.5px solid rgba(85,105,112,.25)',background:'none',cursor:'pointer',fontSize:16,color:'var(--t2)',display:'flex',alignItems:'center',justifyContent:'center'}}>+</button>
        </div>
        <div style={{flex:1,overflowY:'auto',padding:'.375rem .5rem'}}>
          {ROUTINES.map((rt,i)=>(
            <div key={rt.name} onClick={()=>{setSel(i);setNR(false);setLiveOutput('');}} style={{padding:'.625rem .875rem',borderRadius:9,cursor:'pointer',marginBottom:2,background:sel===i&&!nr?'rgba(85,105,112,.1)':'transparent',display:'flex',alignItems:'center',gap:10,transition:'background .15s'}}>
              <div style={{width:10,height:10,borderRadius:'50%',background:rt.color,flexShrink:0,boxShadow:sel===i?'0 0 8px '+rt.color:'none'}}></div>
              <div>
                <div style={{fontSize:13,fontWeight:500,color:'var(--tx)'}}>{rt.name}</div>
                <div style={{fontSize:10,color:'var(--t3)',fontFamily:'Fira Code,monospace'}}>{rt.agent}</div>
              </div>
            </div>
          ))}
        </div>
        {/* API Guide toggle */}
        <div style={{padding:'.75rem',borderTop:'.5px solid rgba(85,105,112,.08)'}}>
          <button onClick={()=>setShowApiGuide(v=>!v)} style={{width:'100%',padding:'.5rem',background:'rgba(171,169,68,.08)',border:'.5px solid rgba(171,169,68,.25)',borderRadius:9,fontSize:11.5,color:'#8A8835',cursor:'pointer',fontWeight:600}}>
            {showApiGuide?'▼ Hide':'▶ API + Cron Setup'}
          </button>
        </div>
      </div>

      {/* Main content */}
      <div style={{flex:1,display:'flex',flexDirection:'column',overflowY:'auto'}}>
        {showApiGuide ? (
          /* ── API CONNECTION GUIDE ── */

            <div style={{fontSize:18,fontWeight:700,marginBottom:4}}>Connect API + Cron Jobs</div>
            <p style={{fontSize:13,color:'var(--t2)',marginBottom:'1.5rem',lineHeight:1.7}}>Two methods to wire your routines. Use both — in-app for manual runs, cron for autonomous scheduled execution. This is the KAIROS pattern.</p>

            {/* Step 1 */}
            <div style={{background:'rgba(85,105,112,.05)',border:'.5px solid rgba(85,105,112,.18)',borderRadius:12,padding:'1rem 1.25rem',marginBottom:'.875rem'}}>

                <div>2. Add file: <code style={{background:'rgba(85,105,112,.1)',padding:'1px 5px',borderRadius:4,fontSize:11}}>api/claude.js</code> (download above)</div>
                <div>3. Add file: <code style={{background:'rgba(85,105,112,.1)',padding:'1px 5px',borderRadius:4,fontSize:11}}>api/cron.js</code> (download above)</div>

              <div style={{fontSize:12,fontWeight:700,color:'#8A8835',fontFamily:'Fira Code,monospace',marginBottom:6}}>STEP 5 — Cron jobs run automatically (zero action needed)</div>
              <p style={{fontSize:13,color:'#8A8835',lineHeight:1.7,marginBottom:8}}>Once deployed, Vercel executes all 8 routines on schedule. The KAIROS daemon pattern: your agents work while you sleep.</p>
              <div style={{background:'rgba(171,169,68,.12)',borderRadius:8,padding:'.625rem .875rem',fontFamily:'Fira Code,monospace',fontSize:11,lineHeight:1.9}}>
                <div style={{color:'#8A8835'}}>0 7 * * 1-5   → Morning Brief (PA) — Weekdays 07:00</div>
                <div style={{color:'#8A8835'}}>0 8 * * 1-5   → Financial Snapshot (LEDGER) — 08:00</div>
                <div style={{color:'#8A8835'}}>0 8,13,17 * * * → Email Triage (ALL AGENTS) — 3x daily</div>
                <div style={{color:'#8A8835'}}>30 10 * * 1-5 → CII World Scan (SCOUT) — 10:30</div>
                <div style={{color:'#8A8835'}}>0 13 * * *    → System Health (PROBE) — 13:00</div>
                <div style={{color:'#8A8835'}}>30 16 * * 1-5 → Issue Triage (GRID) — 16:30</div>

                <div style={{color:'#8A8835'}}>0 19 * * 1-5  → PR Digest (NEXUS) — 19:00</div>
              </div>
            </div>

            <div style={{background:'rgba(85,105,112,.06)',border:'.5px solid rgba(85,105,112,.2)',borderRadius:10,padding:'.75rem 1rem',fontSize:12.5,color:'var(--t2)'}}>
              <strong>Webhook trigger</strong> — any external system can fire a routine:<br/>

/* ── SEARCH VIEW ── */
const SearchView = ({ setView, setSA }) => {
  const [q,setQ]=useState('');
  const [results,setResults]=useState([]);
  const allItems=[
    ...AGENTS.map(a=>({type:'agent',name:a.n,sub:a.r,desc:a.desc,color:a.c,action:()=>{const i=AGENTS.findIndex(ag=>ag.n===a.n);setSA(i);setView('chat');}})),
    ...ROUTINES.map(r=>({type:'routine',name:r.name,sub:r.agent+' · '+r.trigger,desc:r.desc,color:'#ABA944',action:()=>setView('routines')})),
    ...SKILLS.map(s=>({type:'skill',name:s.n,sub:s.t+' · '+s.d,desc:s.desc,color:'#2d7a4f',action:()=>setView('customize')})),
  ];
  const handleSearch = (val) => {

              {l.type==='info'&&l.text}
              {l.type==='warn'&&<span><span style={{color:'#FBBF24'}}>⚠ </span>{l.text}</span>}
              {l.type==='question'&&<span><span style={{color:'#A78BFA',marginRight:8}}>◆</span>{l.text}</span>}

              {l.type==='response'&&(

                    <span style={{width:6,height:6,borderRadius:'50%',background:'#ABA944',display:'inline-block'}}></span>

                  {l.text.split('\n').map((ln,j)=><div key={j} style={{color:'rgba(255,255,255,.8)'}}>{ln||<br/>}</div>)}

          ))}

            <span style={{color:'rgba(255,255,255,.3)',fontFamily:'Fira Code,monospace',fontSize:12,flexShrink:0}}>$</span>

              onKeyDown={e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendTerm();}}}
              placeholder="Type / for commands..." style={{flex:1,background:'none',border:'none',outline:'none',color:'rgba(255,255,255,.85)',fontFamily:'Fira Code,monospace',fontSize:12.5,caretColor:'#ABA944'}}/>

                </button>

};

/* ── CCR PANEL ── */
const CCRPanel = () => {
  const [phase,setPhase]=useState('idle'); /* idle | planning | reviewing | approved */
  const [task,setTask]=useState('');
  const [plan,setPlan]=useState(null);

  const launchCCR = async () => {
    if(!task.trim()) return;
    setPhase('planning'); setPlan(null);
    /* Simulate CCR multi-agent planning pipeline */
    await new Promise(r=>setTimeout(r,1200));
    setPhase('reviewing');
    setPlan({
      task:task,
      explorers:[
        {id:'EXP-1',status:'done',finding:'Identified 3 affected modules: auth, api-gateway, agent-router. Zero breaking changes if migration order: auth → gateway → router.'},
        {id:'EXP-2',status:'done',finding:'Dependency graph: 7 downstream services. All backward-compatible. Rollback path: git tag pre-ccr-'+Date.now().toString(36)+'.'},
        {id:'EXP-3',status:'done',finding:'Risk surface: 2 environment variables need rotation. Staging parity confirmed. Estimated runtime: 4–6 minutes.'},
      ],
      synthesis:'All three explorers agree on execution path. No conflicts detected. Confidence: 94%. Recommended approach: staged deploy with automatic rollback trigger at P95 latency >800ms.',
      steps:[
        {n:1,action:'Rotate ENV vars in Supabase + Vercel',agent:'SIGNAL',risk:'LOW'},
        {n:2,action:'Deploy auth module to staging',agent:'NEXUS',risk:'LOW'},
        {n:3,action:'PROBE smoke test — 42 assertions',agent:'PROBE',risk:'LOW'},
        {n:4,action:'Promote to production with canary 5%',agent:'NEXUS',risk:'MED'},
        {n:5,action:'Monitor P95 latency for 10 min',agent:'KAIROS',risk:'LOW'},
        {n:6,action:'Full production rollout',agent:'NEXUS',risk:'LOW'},
      ]
    });
  };

  const phaseColors={idle:'var(--t3)',planning:'var(--am)',reviewing:'var(--primary)',approved:'var(--gn)'};
  const phaseLabels={idle:'IDLE',planning:'CCR PLANNING…',reviewing:'AWAITING APPROVAL',approved:'APPROVED — EXECUTING'};

  return (
    <div style={{marginTop:'1.5rem',background:'rgba(255,255,255,.85)',border:'.5px solid rgba(85,105,112,.2)',borderRadius:12,overflow:'hidden'}}>

        <div>
          <div style={{fontFamily:'Agdasima,sans-serif',fontSize:16,fontWeight:700,color:'var(--tx)'}}>CCR — Cloud Container Runtime</div>
          <div style={{fontFamily:'Fira Code,monospace',fontSize:9,color:'var(--t3)',marginTop:2,letterSpacing:1.5}}>PARALLEL MULTI-AGENT PLANNING · ANTHROPIC ARCHITECTURE</div>
        </div>
        <div style={{display:'flex',alignItems:'center',gap:6}}>
          <div style={{width:7,height:7,borderRadius:'50%',background:phaseColors[phase]}}></div>
          <span style={{fontFamily:'Fira Code,monospace',fontSize:9,color:phaseColors[phase],letterSpacing:1}}>{phaseLabels[phase]}</span>
        </div>
      </div>

      <div style={{padding:'1rem 1.125rem'}}>
        {phase==='idle'&&(
          <div>
            <div style={{fontSize:12,color:'var(--t2)',lineHeight:1.65,marginBottom:'1rem'}}>
              CCR spins up <strong>3 parallel explorer agents</strong> that analyse your codebase simultaneously, then a Critic/Synthesis agent reviews findings and produces an interactive plan for your approval — before any file is touched.
            </div>
            <div style={{display:'flex',gap:8}}>
              <input className="field" value={task} onChange={e=>setTask(e.target.value)} placeholder="/ultraplan describe the task or feature to plan..." style={{flex:1,background:'rgba(255,255,255,.8)',border:'.5px solid rgba(85,105,112,.2)',fontFamily:'Fira Code,monospace',fontSize:12}} onKeyDown={e=>e.key==='Enter'&&launchCCR()}/>
              <button onClick={launchCCR} className="btn-primary" style={{padding:'.6rem 1.25rem',fontSize:13,whiteSpace:'nowrap'}}>Launch CCR</button>
            </div>
            <div style={{marginTop:'.75rem',display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:'.5rem'}}>
              {[['3 Explorer Agents','Analyse in parallel'],['Critic/Synthesis','Reviews & de-conflicts'],['Interactive Plan','Approve before execute']].map(([t,d])=>(
                <div key={t} style={{background:'rgba(85,105,112,.04)',border:'.5px solid rgba(85,105,112,.1)',borderRadius:8,padding:'.625rem'}}>
                  <div style={{fontSize:11,fontWeight:600,color:'var(--tx)',marginBottom:2}}>{t}</div>
                  <div style={{fontSize:10,color:'var(--t3)',fontFamily:'Fira Code,monospace'}}>{d}</div>
                </div>
              ))}
            </div>
          </div>

        {phase==='planning'&&(
          <div style={{textAlign:'center',padding:'2rem'}}>
            <div style={{display:'flex',justifyContent:'center',gap:12,marginBottom:'1rem'}}>
              {['EXP-1','EXP-2','EXP-3'].map(id=>(
                <div key={id} style={{background:'rgba(85,105,112,.08)',border:'.5px solid rgba(85,105,112,.2)',borderRadius:8,padding:'.5rem .875rem',fontFamily:'Fira Code,monospace',fontSize:11,color:'var(--am)'}}>
                  <div style={{width:8,height:8,borderRadius:'50%',background:'var(--am)',margin:'0 auto 4px',animation:'pdot 1.2s infinite'}}></div>
                  {id}
                </div>
              ))}
            </div>
            <div style={{fontFamily:'Fira Code,monospace',fontSize:11,color:'var(--t3)'}}>Explorer agents analysing in parallel — planning in cloud…</div>
          </div>
        )}

        {(phase==='reviewing'||phase==='approved')&&plan&&(
          <div>
            <div style={{marginBottom:'1rem'}}>
              <div style={{fontSize:10,fontFamily:'Fira Code,monospace',color:'var(--t3)',marginBottom:6,textTransform:'uppercase',letterSpacing:1}}>Explorer findings</div>
              {plan.explorers.map(e=>(
                <div key={e.id} style={{display:'flex',gap:8,padding:'.5rem',background:'rgba(85,105,112,.04)',borderRadius:7,marginBottom:5}}>
                  <span style={{fontFamily:'Fira Code,monospace',fontSize:9,color:'var(--gn)',background:'rgba(45,122,79,.1)',padding:'2px 6px',borderRadius:3,flexShrink:0,alignSelf:'flex-start',marginTop:1}}>{e.id}</span>
                  <span style={{fontSize:12,color:'var(--ink2)',lineHeight:1.5}}>{e.finding}</span>
                </div>
              ))}
            </div>
            <div style={{background:'rgba(171,169,68,.06)',border:'.5px solid rgba(171,169,68,.2)',borderLeft:'3px solid var(--olive)',borderRadius:'0 8px 8px 0',padding:'.75rem',marginBottom:'1rem',fontSize:12,color:'var(--ink2)',lineHeight:1.6}}>
              <strong style={{color:'var(--am)'}}>Synthesis: </strong>{plan.synthesis}
            </div>
            <div style={{marginBottom:'1rem'}}>
              <div style={{fontSize:10,fontFamily:'Fira Code,monospace',color:'var(--t3)',marginBottom:6,textTransform:'uppercase',letterSpacing:1}}>Execution plan — review and approve</div>
              {plan.steps.map(step=>(
                <div key={step.n} style={{display:'flex',alignItems:'center',gap:8,padding:'.5rem .875rem',background:'rgba(255,255,255,.7)',border:'.5px solid rgba(85,105,112,.12)',borderRadius:7,marginBottom:4}}>
                  <span style={{fontFamily:'Fira Code,monospace',fontSize:10,color:'var(--t3)',width:20,flexShrink:0}}>{String(step.n).padStart(2,'0')}</span>
                  <span style={{flex:1,fontSize:12,color:'var(--ink)'}}>{step.action}</span>
                  <span style={{fontFamily:'Fira Code,monospace',fontSize:9,color:'var(--primary)'}}>{step.agent}</span>
                  <span style={{fontFamily:'Fira Code,monospace',fontSize:9,padding:'1px 6px',borderRadius:3,background:step.risk==='LOW'?'rgba(45,122,79,.1)':'rgba(245,158,11,.1)',color:step.risk==='LOW'?'var(--gn)':'var(--am)',border:'.5px solid '+(step.risk==='LOW'?'rgba(45,122,79,.2)':'rgba(245,158,11,.2)')}}>{step.risk}</span>
                </div>
              ))}
            </div>
            {phase==='reviewing'&&(
              <div style={{display:'flex',gap:8}}>
                <button onClick={()=>{setPhase('approved');if(typeof openPreview==='function'){openPreview('<html><body style="padding:2rem;font-family:Georgia,serif;background:#F7F6F2"><h2 style="font-family:Agdasima,sans-serif">CCR Plan Approved</h2><p>NEXUS · PROBE · KAIROS executing...</p><pre style="font-family:Fira Code,monospace;font-size:12px">'+JSON.stringify(plan?.steps||[],null,2)+'</pre></body></html>','html','CCR — Execution');} toast('CCR plan approved — NEXUS executing…');}} className="btn-primary" style={{flex:1}}>Approve & Execute</button>
                <button onClick={()=>{setPhase('idle');setPlan(null);}} className="btn-ghost">Reject plan</button>
              </div>
            )}
            {phase==='approved'&&(
              <div style={{padding:'.75rem',background:'rgba(45,122,79,.06)',border:'.5px solid rgba(45,122,79,.2)',borderRadius:8,fontFamily:'Fira Code,monospace',fontSize:11,color:'var(--gn)'}}>
                ✓ Executing plan — NEXUS · PROBE · KAIROS all active · Monitor in Routines
              </div>
            )}
          </div>
        )}
      </div>
    </div>
  );
};

      <div style={{background:'rgba(255,255,255,.85)',border:'.5px solid rgba(85,105,112,.2)',borderRadius:10,padding:'1rem',display:'flex',gap:8,alignItems:'flex-start',marginBottom:queued?8:0}}>
        <textarea value={task} onChange={e=>setTask(e.target.value)} placeholder="Describe a Computer Use task — e.g. Open Chrome, search phoennixai.com, take a screenshot and save to Desktop" rows={2} style={{flex:1,background:'none',border:'none',outline:'none',fontSize:13,fontFamily:'Source Serif 4,serif',resize:'none',color:'var(--tx)',lineHeight:1.6}}/>
        <button onClick={()=>{if(task.trim()){setQueued(true);toast('Task queued for KAIROS daemon');}}} style={{background:'linear-gradient(135deg,#3E4F55,#556970)',border:'none',borderRadius:8,padding:'.625rem 1.125rem',color:'#fff',fontSize:12,cursor:'pointer',fontWeight:600,fontFamily:'Source Serif 4,serif',whiteSpace:'nowrap',flexShrink:0}}>Queue task</button>
      </div>
      {queued&&<div style={{fontSize:11,color:'var(--am)',fontFamily:'Fira Code,monospace',padding:'.5rem .75rem',background:'rgba(171,169,68,.06)',borderRadius:7,border:'.5px solid rgba(171,169,68,.2)'}}>Task queued — KAIROS will execute when Electron desktop app is running</div>}
    </div>
  );
};

/* ── PROJECTS VIEW ── */
const ProjectsView = () => {
  const projs=[
    {name:'RYD — Reset Your Digital',client:'Nathan Mather',phase:'Phase 1 — Build',agents:'NEXUS · SCRIBE · PROBE · RELAY',status:'active',date:'Launch: Jun 2026'},
    {name:'PhoennixAI Platform',client:'Internal',phase:'Phase 2 — GTM',agents:'CLAUDE · GRID · PULSE · LEDGER',status:'active',date:'Live: Apr 2026'},
    {name:'VANTAGE Intel Platform',client:'Nathan Mather',phase:'Design + Build',agents:'PICASSO · NEXUS · PROBE',status:'active',date:'Q2 2026'},
    {name:'Cupcakes & Cocktails',client:'Mayah Wilcox',phase:'Launch Prep',agents:'PULSE · RELAY · LEDGER',status:'pending',date:'Pre-launch'},

  return (
    <div style={{padding:'1.5rem 2rem',maxWidth:900,margin:'0 auto'}}>
      <div style={{display:'flex',flexDirection:'column',gap:'.75rem'}}>

          <div key={p.name} className="glass-card no-hover" style={{padding:'1.125rem',display:'flex',alignItems:'center',gap:'1.5rem',flexWrap:'wrap'}}>

            <div style={{flex:1,minWidth:200}}>
              <div style={{fontWeight:600,fontSize:14,marginBottom:2}}>{p.name}</div>
              <div style={{fontSize:12,color:'var(--t2)'}}>{p.phase}</div>
            </div>
            <div style={{fontSize:12,color:'var(--t3)',fontFamily:'Fira Code,monospace'}}>{p.client}</div>
            <div style={{fontSize:11,color:'var(--primary)',fontFamily:'Fira Code,monospace'}}>{p.agents}</div>

/* ── PREVIEW PANEL ── */
const PreviewPanel = ({ open, content, onClose, width, onWidthChange }) => {
  const [tab,setTab]=useState('preview');
  const [dragging,setDragging]=useState(false);
  const dragRef=useRef();const startX=useRef();const startW=useRef();

  /* Drag-to-resize — fully self-contained */
  const startDrag=(e)=>{
    e.preventDefault();
    startX.current=e.clientX; startW.current=width;
    setDragging(true);
    const move=(ev)=>{ const diff=startX.current-ev.clientX; onWidthChange(Math.min(900,Math.max(300,startW.current+diff))); };
    const up=()=>{ setDragging(false); document.removeEventListener('mousemove',move); document.removeEventListener('mouseup',up); document.body.style.cursor=''; document.body.style.userSelect=''; };
    document.addEventListener('mousemove',move); document.addEventListener('mouseup',up);
    document.body.style.cursor='col-resize'; document.body.style.userSelect='none';
  };

  /* Format content for display */
  const srcDoc = content?.type==='html' ? content.html :
    content?.type==='doc' ? '<html><body style="padding:2rem;font-family:Georgia,serif;line-height:1.7;max-width:680px;margin:0 auto;color:#141A1D">'+content.html+'</body></html>' :
    '<html><body style="background:#F7F6F2;padding:1rem"><pre style="font-family:Fira Code,monospace;font-size:12px;line-height:1.7;white-space:pre-wrap;color:#141A1D">'+content?.html+'</pre></body></html>';

  /* Sample artifacts library */
  const ARTIFACTS=[
    {id:1,title:'Brand System v1.3',type:'html',icon:'◈',desc:'PhoennixAI brand colours, typography, logo system'},
    {id:2,title:'Client Dashboard',type:'html',icon:'▣',desc:'24 clients · £47.2k MRR · 31 agents'},
    {id:3,title:'VANTAGE Brochure',type:'doc',icon:'◎',desc:'RYD platform — navy + amber identity'},
    {id:4,title:'Phoenix Pro Brochure',type:'html',icon:'⊕',desc:'Full product brochure — slate + olive'},
    {id:5,title:'CCR Plan: RYD Phase 2',type:'code',icon:'⧉',desc:'6-step NEXUS execution plan'},
  ];

  return (
    <div className={'preview-panel '+(open?'open':'closed')} style={{width}}>
      {/* Drag handle */}
      <div className="preview-drag" onMouseDown={startDrag}></div>

      {/* Topbar */}
      <div className="preview-topbar">
        <button onClick={()=>setTab('preview')} className={'preview-tab '+(tab==='preview'?'active':'')}>Preview</button>
        <button onClick={()=>setTab('artifacts')} className={'preview-tab '+(tab==='artifacts'?'active':'')}>Artifacts</button>
        <button onClick={()=>setTab('output')} className={'preview-tab '+(tab==='output'?'active':'')}>Output</button>
        <div style={{flex:1}}/>
        <div className="preview-title" style={{fontFamily:'Agdasima,sans-serif',fontSize:14,fontWeight:700,color:'var(--tx)'}}>{content?.title||'Dynamic Workspace'}</div>
        <button onClick={()=>{
          if(content?.html){
            const b=new Blob([content.html],{type:'text/html'});
            const u=URL.createObjectURL(b);
            const a=document.createElement('a');
            a.href=u; a.download=(content.title||'output').replace(/[^a-z0-9]/gi,'-')+'.html';
            document.body.appendChild(a); a.click();
            setTimeout(()=>{document.body.removeChild(a);URL.revokeObjectURL(u);},100);
          } else { toast('Nothing to download yet — ask an agent to build something'); }
        }} title="Download as HTML" style={{background:'rgba(85,105,112,.08)',border:'.5px solid rgba(85,105,112,.2)',borderRadius:6,padding:'4px 10px',fontSize:11,color:'var(--t2)',cursor:'pointer',fontFamily:'Fira Code,monospace',display:'flex',alignItems:'center',gap:4,transition:'all .15s'}} onMouseOver={e=>e.currentTarget.style.background='rgba(85,105,112,.14)'} onMouseOut={e=>e.currentTarget.style.background='rgba(85,105,112,.08)'}>
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" strokeWidth="1.5"><path d="M6 1v7M3 6l3 3 3-3"/><path d="M1 11h10" strokeLinecap="round"/></svg>
          Save
        </button>
        <button onClick={onClose} style={{background:'none',border:'.5px solid rgba(85,105,112,.2)',borderRadius:6,width:26,height:26,display:'flex',alignItems:'center',justifyContent:'center',fontSize:13,color:'var(--t2)',cursor:'pointer',transition:'all .15s'}} onMouseOver={e=>e.currentTarget.style.background='rgba(85,105,112,.08)'} onMouseOut={e=>e.currentTarget.style.background='none'}>✕</button>
      </div>

      {/* Body */}
      <div className="preview-body">
        {tab==='preview'&&(
          content
            ? <iframe srcDoc={srcDoc} sandbox="allow-scripts allow-same-origin" title="preview"/>
            : <div className="preview-empty">
                <div className="preview-empty-icon">⬡</div>
                <div className="preview-empty-text">Your Dynamic Workspace is ready.<br/>Ask any agent to build something — it will appear here instantly.</div>
                <div className="preview-empty-hint">Code · Documents · Designs · Charts · Artifacts</div>
              </div>
        )}
        {tab==='artifacts'&&(
          <div style={{padding:'1rem',overflowY:'auto',height:'100%',display:'flex',flexDirection:'column',gap:'.625rem'}}>
            <div style={{fontSize:9,fontFamily:'Fira Code,monospace',color:'var(--t3)',letterSpacing:2,textTransform:'uppercase',marginBottom:4}}>Saved Artifacts</div>
            {ARTIFACTS.map(a=>(
              <div key={a.id} style={{background:'rgba(255,255,255,.85)',border:'.5px solid rgba(85,105,112,.15)',borderRadius:9,padding:'.75rem 1rem',cursor:'pointer',display:'flex',alignItems:'center',gap:.75+'rem',transition:'all .15s'}} onClick={()=>{setTab('preview');}} onMouseOver={e=>e.currentTarget.style.borderColor='rgba(85,105,112,.35)'} onMouseOut={e=>e.currentTarget.style.borderColor='rgba(85,105,112,.15)'}>
                <span style={{fontSize:18,opacity:.5}}>{a.icon}</span>
                <div style={{flex:1}}>
                  <div style={{fontSize:13,fontWeight:600,fontFamily:'Agdasima,sans-serif',color:'var(--tx)',marginBottom:2}}>{a.title}</div>
                  <div style={{fontSize:10,color:'var(--t3)',fontFamily:'Fira Code,monospace'}}>{a.type.toUpperCase()} · {a.desc}</div>
                </div>
                <span style={{fontSize:10,color:'var(--primary)',fontFamily:'Fira Code,monospace'}}>Open →</span>
              </div>
            ))}
          </div>
        )}
        {tab==='output'&&(
          <div className="code-view">
            <div style={{color:'var(--olive-d)',marginBottom:8,fontSize:11,fontWeight:500}}>// Output stream — NEXUS · PROBE · KAIROS</div>
            <div style={{color:'var(--gn)'}}>✓ Agent NEXUS — Build complete</div>
            <div style={{color:'var(--primary)',marginTop:4}}>→ PROBE running 42 assertions...</div>
            <div style={{color:'var(--gn)',marginTop:4}}>✓ PROBE QA pass — zero critical issues</div>
            <div style={{color:'var(--primary)',marginTop:4}}>→ Ready for preview · Accept or Reject below</div>
            <div style={{marginTop:'1rem',display:'flex',gap:8}}>
              <button onClick={()=>toast('Changes accepted and applied')} style={{background:'linear-gradient(135deg,#3E4F55,#556970)',border:'none',borderRadius:8,padding:'.5rem 1.25rem',color:'#fff',fontSize:12,cursor:'pointer',fontFamily:'Fira Code,monospace',fontWeight:600}}>✓ Accept</button>
              <button onClick={()=>toast('Changes rejected')} style={{background:'none',border:'.5px solid rgba(85,105,112,.25)',borderRadius:8,padding:'.5rem 1.25rem',color:'var(--t2)',fontSize:12,cursor:'pointer',fontFamily:'Fira Code,monospace'}}>✕ Reject</button>
              <button onClick={()=>toast('Copying output...')} style={{background:'none',border:'.5px solid rgba(85,105,112,.25)',borderRadius:8,padding:'.5rem 1rem',color:'var(--t2)',fontSize:12,cursor:'pointer',fontFamily:'Fira Code,monospace'}}>Copy</button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
};

/* Track global drag state for cursor */
/* ── APP ── */
const App = () => {
  const [loggedIn,setLoggedIn]=useState(false);
  const [user,setUser]=useState('Valerie');
  const [view,setView]=useState('home'); const [sidebarOpen,setSidebarOpen]=useState(true);
  const [prevView,setPrevView]=useState(null);
  const [selAgent,setSA]=useState(0);
  const [previewOpen,setPreviewOpen]=useState(false);
  const [previewContent,setPreviewContent]=useState(null);
  const [previewType,setPreviewType]=useState('html'); /* html | code | doc | image */
  const [panelWidth,setPanelWidth]=useState(480);
  /* Share preview function so any component can push to panel */
  const openPreview = (content, type='html', title='Preview') => {
    setPreviewContent({html:content,type,title});
    setPreviewType(type);
    setPreviewOpen(true);
  };
  useEffect(()=>{
    initCanvas();
    const handler=(e)=>{
      if((e.metaKey||e.ctrlKey)&&e.key==='k'){e.preventDefault();handleSetView('search');}
      if((e.metaKey||e.ctrlKey)&&e.key==='/'){e.preventDefault();handleSetView('customize');}
      if((e.metaKey||e.ctrlKey)&&e.key==='j'){e.preventDefault();handleSetView('chat');}
    };
    window.addEventListener('keydown',handler);
    return()=>window.removeEventListener('keydown',handler);
  },[]);
  const handleLogin = (em) => {
    const n=em.split('@')[0]; setUser(n.charAt(0).toUpperCase()+n.slice(1));
    setLoggedIn(true);
    setTimeout(()=>{
      g.from('#sidebar',{x:-220,duration:.7,ease:'power3.out'});
      g.from('#main',{opacity:0,duration:.6,delay:.2});
    },50);
  };
  const handleSetView = (v) => {
    if(v==='search') setPrevView(view);
    if(v!=='search') setPrevView(null);
    const ov=document.getElementById('overlay');
    if(v==='search'){ setView(v); return; } // no flash for modal
    g.to(ov,{opacity:1,duration:.12,onComplete:()=>{ setView(v); g.to(ov,{opacity:0,duration:.18,delay:.05}); }});
  };
  const TITLES={home:'PhoennixAI',agents:'Agent Roster',chat:'Agent Chat',routines:'Routines',design:'Design',client:'Client Dashboard',customize:'Customize',manual:'User Manual',search:'Search',code:'Code',desktop:'Computer Use',projects:'Projects'};
  if(!loggedIn) return <Login onLogin={handleLogin}/>;
  return (
    <div style={{display:'flex',width:'100vw',height:'100vh',overflow:'hidden'}}>
      <Sidebar view={view} setView={handleSetView} user={user} sidebarOpen={sidebarOpen} setSidebarOpen={setSidebarOpen}/>
      <div id="main" style={{flex:1,marginRight:previewOpen?panelWidth:0,transition:'margin-right .22s cubic-bezier(.4,0,.2,1)',overflow:'hidden',display:'flex',flexDirection:'column'}}>
        <Topbar title={TITLES[view==='search'?prevView||'home':view]||'PhoennixAI'} onOpenPreview={()=>setPreviewOpen(o=>!o)} previewOpen={previewOpen} previewContent={previewContent}/>
        <div style={{flex:1,overflow:'hidden',display:'flex',flexDirection:'column',position:'relative'}}>
          {/* Search renders as overlay — not replacing current view */}
          {view==='search'&&<SearchView setView={v=>{setPrevView(null);handleSetView(v);}} setSA={setSA}/>}
          {/* Always render the underlying view */}
          {(view==='home'||view==='search')&&<Home setView={handleSetView} setSA={setSA} openPreview={openPreview}/>}
          {view==='agents'&&<Agents setView={handleSetView} setSA={setSA}/>}
          {view==='chat'&&<AgentChat selAgent={selAgent} setSA={setSA} openPreview={openPreview}/>}
          {view==='routines'&&<Routines/>}
          {view==='design'&&<Design openPreview={openPreview}/>}
          {view==='client'&&<ClientData/>}
          {view==='customize'&&<Customize/>}
          {view==='manual'&&<UserManual/>}
          {view==='code'&&<CodeView openPreview={openPreview}/>}
          {view==='projects'&&<ProjectsView/>}
          {view==='desktop'&&<ComputerUsePanel/>}
        </div>
      </div>

      {/* Split Screen Toggle button */}
      <button className="split-toggle" onClick={()=>setPreviewOpen(o=>!o)} title={previewOpen?'Close preview panel':'Open Dynamic Workspace'} style={{right:previewOpen?panelWidth:0,transition:'right .22s cubic-bezier(.4,0,.2,1)'}}>
        <div style={{position:'relative'}}>
          {previewOpen
            ? <svg width="10" height="10" viewBox="0 0 10 10" fill="none" stroke="currentColor" strokeWidth="1.5"><path d="M2 2l6 0M2 5l6 0M2 8l6 0"/></svg>
            : <svg width="10" height="10" viewBox="0 0 10 10" fill="none" stroke="currentColor" strokeWidth="1.5"><rect x="1" y="1" width="8" height="8" rx="1.5"/><path d="M5.5 1v8"/></svg>
          }
          {previewContent&&!previewOpen&&<div className="preview-badge">1</div>}
        </div>
      </button>

      <PreviewPanel open={previewOpen} content={previewContent} onClose={()=>setPreviewOpen(false)} width={panelWidth} onWidthChange={setPanelWidth}/>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
