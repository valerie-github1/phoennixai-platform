<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>PhoennixAI — Platform</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@babel/standalone@7.23.5/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<style>
:root{
  --bg:#05070e;--s1:#080c1c;--s2:#0d1228;--s3:#131a35;--s4:#1a2240;
  --b0:rgba(255,255,255,.04);--b1:rgba(255,255,255,.08);--b2:rgba(255,255,255,.14);
  --primary:#5B5FEE;--primary2:#7C6EF5;--accent:#8B5CF6;--cyan:#00CFFF;
  --gn:#10b981;--am:#f59e0b;--rd:#ef4444;--fi:#ff6b2b;
  --tx:#eef0ff;--t2:#8b95c4;--t3:#3e4670;
  --sidebar:220px;
  --grad:linear-gradient(135deg,#3b42dd,#6b3fd4);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-font-smoothing:antialiased}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;overflow-x:hidden}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--s4);border-radius:2px}
::selection{background:rgba(91,95,238,0.3)}

/* ── CANVAS ── */
#bgCanvas{position:fixed;inset:0;z-index:0;pointer-events:none}

/* ── ORBS ── */
.orb{position:fixed;border-radius:50%;filter:blur(90px);pointer-events:none;z-index:0;animation:orbDrift ease-in-out infinite alternate}
.orb1{width:700px;height:700px;background:radial-gradient(circle,rgba(67,56,202,.16),transparent 70%);top:-200px;left:-150px;animation-duration:18s}
.orb2{width:550px;height:550px;background:radial-gradient(circle,rgba(124,70,240,.13),transparent 70%);bottom:-100px;right:5%;animation-duration:22s;animation-delay:-8s}
.orb3{width:400px;height:400px;background:radial-gradient(circle,rgba(0,207,255,.07),transparent 70%);top:45%;left:45%;animation-duration:16s;animation-delay:-4s}
.orb4{width:350px;height:350px;background:radial-gradient(circle,rgba(139,92,246,.1),transparent 70%);top:20%;right:25%;animation-duration:24s;animation-delay:-12s}
@keyframes orbDrift{0%{transform:translate(0,0) scale(1)}100%{transform:translate(40px,-30px) scale(1.08)}}

/* ── LIQUID GLASS ── */
.glass{background:rgba(255,255,255,.04);backdrop-filter:blur(20px) saturate(180%);-webkit-backdrop-filter:blur(20px) saturate(180%);border:0.5px solid rgba(255,255,255,.09)}
.glass-card{background:linear-gradient(135deg,rgba(255,255,255,.06),rgba(255,255,255,.02));backdrop-filter:blur(24px) saturate(200%);-webkit-backdrop-filter:blur(24px) saturate(200%);border:0.5px solid rgba(255,255,255,.10);border-radius:14px;transition:all .25s ease;position:relative;overflow:hidden}
.glass-card::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.055) 0%,transparent 60%);pointer-events:none;border-radius:inherit}
.glass-card:hover{background:linear-gradient(135deg,rgba(255,255,255,.09),rgba(255,255,255,.03));border-color:rgba(255,255,255,.16);transform:translateY(-2px);box-shadow:0 20px 60px rgba(0,0,0,.45),0 0 1px rgba(255,255,255,.06) inset}
.glass-card.no-hover:hover{transform:none;box-shadow:none}

/* ── LOGO CIRCLE ── */
.logo-ring{border-radius:50%;overflow:hidden;flex-shrink:0;position:relative}
.logo-ring::after{content:'';position:absolute;inset:0;border-radius:50%;border:2px solid transparent;background:linear-gradient(135deg,#00CFFF,#5B5FEE,#8B5CF6) border-box;-webkit-mask:linear-gradient(#fff 0 0) padding-box,linear-gradient(#fff 0 0);-webkit-mask-composite:destination-out;mask-composite:exclude;animation:ringPulse 3s ease-in-out infinite;pointer-events:none}
.logo-ring img{width:100%;height:100%;object-fit:cover;border-radius:50%;display:block}
@keyframes ringPulse{0%,100%{box-shadow:0 0 0 0 transparent,0 0 18px rgba(0,207,255,.45)}50%{box-shadow:0 0 0 3px rgba(91,95,238,.15),0 0 28px rgba(0,207,255,.65)}}

/* ── GRADIENT TEXT ── */
.grad-text{background:linear-gradient(135deg,#00CFFF 0%,#7B7FFF 40%,#A78BFA 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}

/* ── BUTTONS ── */
.btn-primary{background:linear-gradient(135deg,#4338ca,#5B5FEE,#6d40e0);border:none;border-radius:10px;padding:.7rem 1.2rem;color:#fff;font-size:13.5px;font-weight:600;cursor:pointer;box-shadow:0 4px 20px rgba(91,95,238,.4),0 1px 0 rgba(255,255,255,.15) inset;transition:all .2s;position:relative;overflow:hidden;font-family:inherit}
.btn-primary::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.15),transparent);pointer-events:none}
.btn-primary:hover{box-shadow:0 8px 32px rgba(91,95,238,.6);transform:translateY(-1px)}
.btn-primary:active{transform:translateY(0);box-shadow:0 3px 12px rgba(91,95,238,.35)}
.btn-ghost{background:none;border:0.5px solid rgba(255,255,255,.16);border-radius:9px;padding:.45rem .9rem;color:var(--tx);font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;font-family:inherit}
.btn-ghost:hover{border-color:rgba(255,255,255,.28);background:rgba(255,255,255,.05)}
.btn-solid{background:var(--tx);border:none;border-radius:9px;padding:.45rem .9rem;color:var(--bg);font-size:13px;font-weight:700;cursor:pointer;transition:opacity .15s;font-family:inherit}
.btn-solid:hover{opacity:.88}

/* ── FIELDS ── */
.field{background:rgba(255,255,255,.04);border:0.5px solid rgba(255,255,255,.1);border-radius:10px;padding:.65rem .9rem;color:var(--tx);font-size:13.5px;outline:none;width:100%;transition:border-color .2s,box-shadow .2s;font-family:inherit}
.field:focus{border-color:rgba(91,95,238,.6);box-shadow:0 0 0 3px rgba(91,95,238,.12)}
.field::placeholder{color:var(--t3)}
textarea.field{resize:none;line-height:1.6}

/* ── SIDEBAR ── */
#sidebar{width:var(--sidebar);position:fixed;top:0;left:0;bottom:0;z-index:50;display:flex;flex-direction:column;background:rgba(6,8,18,.82);backdrop-filter:blur(28px);-webkit-backdrop-filter:blur(28px);border-right:0.5px solid rgba(255,255,255,.06)}
.sb-item{display:flex;align-items:center;gap:.5rem;padding:.48rem .75rem;border-radius:9px;font-size:13px;font-weight:500;color:var(--t2);border:none;cursor:pointer;width:100%;text-align:left;transition:all .15s;background:none;position:relative;font-family:inherit}
.sb-item:hover{color:var(--tx);background:rgba(255,255,255,.04)}
.sb-item.active{color:var(--tx);background:rgba(91,95,238,.12)}
.sb-item.active::before{content:'';position:absolute;left:0;top:22%;bottom:22%;width:2.5px;background:linear-gradient(180deg,#00CFFF,#5B5FEE,#8B5CF6);border-radius:0 2px 2px 0}
.sb-icon{font-size:13px;width:16px;text-align:center;flex-shrink:0;opacity:.7}
.sb-item.active .sb-icon,.sb-item:hover .sb-icon{opacity:1}

/* ── MAIN ── */
#main{margin-left:var(--sidebar);min-height:100vh;position:relative;z-index:1}
#topbar{position:sticky;top:0;z-index:40;background:rgba(5,7,14,.75);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:0.5px solid rgba(255,255,255,.06);padding:.7rem 1.5rem;display:flex;align-items:center;justify-content:space-between}

/* ── STATUS PILLS ── */
.pill{font-size:10px;padding:2px 8px;border-radius:100px;font-weight:600;letter-spacing:.04em}
.pill-on{background:rgba(16,185,129,.12);color:#34d399;border:0.5px solid rgba(16,185,129,.25)}
.pill-sb{background:rgba(91,95,238,.12);color:#9398ff;border:0.5px solid rgba(91,95,238,.25)}
.pill-q{background:rgba(245,158,11,.12);color:#fbbf24;border:0.5px solid rgba(245,158,11,.25)}
.pill-p{background:rgba(239,68,68,.12);color:#f87171;border:0.5px solid rgba(239,68,68,.25)}
.pill-badge{font-size:11px;padding:3px 10px;border-radius:100px;font-weight:500;border:0.5px solid}
.badge-p{background:rgba(91,95,238,.12);border-color:rgba(91,95,238,.3);color:#9398ff}
.badge-g{background:rgba(16,185,129,.1);border-color:rgba(16,185,129,.25);color:#34d399;display:flex;align-items:center;gap:5px}

/* ── PULSE DOT ── */
.pulse-dot{width:7px;height:7px;border-radius:50%;background:var(--gn);box-shadow:0 0 8px var(--gn);animation:pdot 2.5s ease-in-out infinite}
@keyframes pdot{0%,100%{opacity:1;box-shadow:0 0 8px var(--gn)}50%{opacity:.4;box-shadow:0 0 3px var(--gn)}}

/* ── HOME INPUT ── */
.home-box{background:rgba(255,255,255,.035);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border:0.5px solid rgba(255,255,255,.1);border-radius:16px;overflow:hidden;transition:border-color .2s,box-shadow .2s}
.home-box:focus-within{border-color:rgba(91,95,238,.45);box-shadow:0 0 0 3px rgba(91,95,238,.09)}
.home-ta{display:block;width:100%;background:none;border:none;outline:none;padding:1rem 1.25rem .75rem;color:var(--tx);font-size:14.5px;resize:none;min-height:64px;line-height:1.6;font-family:'Inter',sans-serif}
.home-ta::placeholder{color:var(--t3)}
.hq-btn{background:rgba(255,255,255,.04);border:0.5px solid rgba(255,255,255,.09);border-radius:8px;padding:.35rem .75rem;font-size:12px;font-weight:500;color:var(--t2);cursor:pointer;transition:all .15s;font-family:inherit}
.hq-btn:hover{background:rgba(91,95,238,.12);border-color:rgba(91,95,238,.3);color:var(--tx)}

/* ── METRIC CARD ── */
.metric-card{border-radius:14px;padding:1.125rem;background:linear-gradient(135deg,rgba(255,255,255,.055),rgba(255,255,255,.02));backdrop-filter:blur(20px);border:0.5px solid rgba(255,255,255,.09);cursor:pointer;transition:all .22s;overflow:hidden;position:relative}
.metric-card::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(91,95,238,.4),transparent);opacity:0;transition:opacity .3s}
.metric-card:hover::after{opacity:1}
.metric-card:hover{transform:translateY(-3px);box-shadow:0 24px 50px rgba(0,0,0,.45);border-color:rgba(255,255,255,.16)}

/* ── AGENT GRID ── */
.ag-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(295px,1fr));gap:.5rem;margin-bottom:1rem}
.ag-row{background:linear-gradient(135deg,rgba(255,255,255,.05),rgba(255,255,255,.02));border:0.5px solid rgba(255,255,255,.09);border-radius:11px;padding:.72rem 1rem;display:flex;align-items:center;gap:.72rem;cursor:pointer;transition:all .18s;position:relative;overflow:hidden}
.ag-row::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.04),transparent);pointer-events:none}
.ag-row:hover{border-color:rgba(91,95,238,.4);background:linear-gradient(135deg,rgba(91,95,238,.1),rgba(91,95,238,.04));transform:translateX(2px);box-shadow:0 8px 24px rgba(0,0,0,.3)}

/* ── CHAT ── */
.bubble-u{background:linear-gradient(135deg,rgba(91,95,238,.22),rgba(91,95,238,.1));border:0.5px solid rgba(91,95,238,.28);border-radius:14px 14px 3px 14px;padding:.65rem .9rem;font-size:13.5px;line-height:1.65}
.bubble-a{background:linear-gradient(135deg,rgba(255,255,255,.06),rgba(255,255,255,.02));border:0.5px solid rgba(255,255,255,.09);border-radius:14px 14px 14px 3px;padding:.65rem .9rem;font-size:13.5px;line-height:1.65}
.msg-wrap:hover .msg-acts{opacity:1;transform:translateY(0)}
.msg-acts{opacity:0;transform:translateY(4px);transition:all .18s;display:flex;gap:4px}
.act-btn{background:rgba(255,255,255,.05);border:0.5px solid rgba(255,255,255,.1);border-radius:6px;padding:2px 8px;font-size:11px;color:var(--t2);cursor:pointer;transition:all .12s;font-family:inherit}
.act-btn:hover{border-color:rgba(255,255,255,.2);color:var(--tx);background:rgba(255,255,255,.09)}

/* ── TYPING ── */
.typing-dot{width:6px;height:6px;border-radius:50%;background:var(--t2);display:inline-block;animation:typ 1.4s infinite both}
.typing-dot:nth-child(2){animation-delay:.2s}.typing-dot:nth-child(3){animation-delay:.4s}
@keyframes typ{0%,80%,100%{opacity:.15;transform:scale(1)}40%{opacity:1;transform:scale(1.3)}}

/* ── ROUTINES ── */
.rt-item{display:flex;align-items:center;gap:.625rem;padding:.45rem .75rem;border-radius:8px;font-size:12.5px;color:var(--t2);cursor:pointer;transition:all .15s;font-weight:500}
.rt-item:hover{background:rgba(255,255,255,.05);color:var(--tx)}
.rt-item.active{background:rgba(91,95,238,.12);color:var(--tx)}
.rt-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}

/* ── TOGGLE ── */
.toggle-track{position:relative;width:38px;height:21px;cursor:pointer;background:var(--s4);border-radius:100px;border:0.5px solid rgba(255,255,255,.12);transition:background .2s}
.toggle-track.on{background:linear-gradient(135deg,#4338ca,#5B5FEE)}
.toggle-thumb{position:absolute;width:15px;height:15px;border-radius:50%;background:#fff;top:3px;left:3px;transition:left .2s;box-shadow:0 1px 4px rgba(0,0,0,.3)}
.toggle-track.on .toggle-thumb{left:20px}

/* ── TRIG OPT ── */
.trig-opt{background:rgba(255,255,255,.03);border:0.5px solid rgba(255,255,255,.08);border-radius:10px;padding:.875rem 1rem;margin-bottom:.5rem;cursor:pointer;display:flex;align-items:flex-start;gap:.75rem;transition:all .2s}
.trig-opt:hover,.trig-opt.sel{border-color:rgba(91,95,238,.5);background:rgba(91,95,238,.07)}

/* ── DATA TABLE ── */
.dt{width:100%;border-collapse:collapse}
.dt th{background:rgba(255,255,255,.03);padding:.65rem 1rem;text-align:left;font-weight:600;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--t3);border-bottom:.5px solid rgba(255,255,255,.06)}
.dt td{padding:.7rem 1rem;border-bottom:.5px solid rgba(255,255,255,.04);color:var(--t2);font-size:13px;vertical-align:middle}
.dt tr:hover td{background:rgba(255,255,255,.025)}
.dt tr:last-child td{border-bottom:none}

/* ── SKILL ROW / CONN ROW ── */
.panel-row{display:flex;align-items:center;gap:.625rem;padding:.45rem .75rem;border-radius:8px;font-size:12.5px;color:var(--t2);cursor:pointer;transition:all .12s;font-weight:500;overflow:hidden;white-space:nowrap;text-overflow:ellipsis}
.panel-row:hover{background:rgba(91,95,238,.1);color:var(--tx)}
.panel-row.active{background:rgba(91,95,238,.12);color:var(--tx)}
.panel-ico{width:22px;height:22px;border-radius:6px;background:rgba(91,95,238,.12);border:0.5px solid rgba(91,95,238,.2);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#9398ff;flex-shrink:0}

/* ── TOAST ── */
#toast{position:fixed;bottom:1.5rem;right:1.5rem;background:rgba(12,16,36,.95);backdrop-filter:blur(20px);border:.5px solid rgba(255,255,255,.14);border-radius:10px;padding:.65rem 1.1rem;font-size:13px;color:var(--tx);z-index:9999;display:none;box-shadow:0 16px 40px rgba(0,0,0,.5);animation:toastIn .25s cubic-bezier(0.16,1,0.3,1)}
@keyframes toastIn{from{transform:translateY(12px) scale(.97);opacity:0}to{transform:translateY(0) scale(1);opacity:1}}

/* ── VIEW OVERLAY ── */
#overlay{position:fixed;inset:0;background:rgba(5,7,14,.5);z-index:200;pointer-events:none;opacity:0}

/* ── SECTION LABEL ── */
.sec-lbl{font-size:10px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--t3);margin:.875rem 0 .625rem}

/* ── DESIGN TYPES ── */
.type-card{border:0.5px solid rgba(255,255,255,.09);border-radius:11px;padding:.75rem;cursor:pointer;transition:all .15s;background:rgba(255,255,255,.03);text-align:center}
.type-card:hover{border-color:rgba(91,95,238,.4)}
.type-card.sel{border-color:rgba(91,95,238,.6);background:rgba(91,95,238,.1)}
.type-preview{height:54px;border-radius:6px;margin-bottom:.5rem;display:flex;align-items:center;justify-content:center;font-size:20px;color:rgba(255,255,255,.25)}

/* ── MANUAL TOC ── */
.toc-item{display:flex;align-items:center;gap:.625rem;padding:.45rem .75rem;border-radius:8px;font-size:12.5px;color:var(--t2);cursor:pointer;transition:all .15s;font-weight:500;margin-bottom:2px}
.toc-item:hover{background:rgba(255,255,255,.05);color:var(--tx)}
.toc-item.active{background:rgba(91,95,238,.12);color:var(--tx)}
</style>
</head>
<body>
<canvas id="bgCanvas"></canvas>
<div class="orb orb1"></div>
<div class="orb orb2"></div>
<div class="orb orb3"></div>
<div class="orb orb4"></div>
<div id="overlay"></div>
<div id="root"></div>
<div id="toast"></div>

/* ── CANVAS PARTICLES ── */
const initCanvas = () => {
  const cv = document.getElementById('bgCanvas');
  const ctx = cv.getContext('2d');
  let W, H, pts = [], frame = 0;
  const resize = () => { W = cv.width = window.innerWidth; H = cv.height = window.innerHeight; };
  resize(); window.addEventListener('resize', resize);
  for (let i = 0; i < 70; i++) pts.push({ x:Math.random()*1920, y:Math.random()*1080, vx:(Math.random()-.5)*.25, vy:(Math.random()-.5)*.25, r:Math.random()*1.4+.3, hue:210+Math.random()*80, life:Math.random()*Math.PI*2 });
  const tick = () => {
    ctx.clearRect(0, 0, W, H); frame++;
    pts.forEach((p,i) => {
      p.life += .007; p.x += p.vx+Math.sin(p.life*.6)*.14; p.y += p.vy+Math.cos(p.life*.4)*.11;
      if(p.x<0)p.x=W; if(p.x>W)p.x=0; if(p.y<0)p.y=H; if(p.y>H)p.y=0;
      const a=(Math.sin(p.life)*.5+.5)*.3;
      ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle='hsl('+p.hue+',75%,72%)'; ctx.globalAlpha=a; ctx.fill();
      for(let j=i+1;j<pts.length;j++){
        const q=pts[j],dx=p.x-q.x,dy=p.y-q.y,d=Math.sqrt(dx*dx+dy*dy);
        if(d<110){ ctx.beginPath(); ctx.moveTo(p.x,p.y); ctx.lineTo(q.x,q.y); ctx.strokeStyle='hsl(235,70%,72%)'; ctx.globalAlpha=(1-d/110)*.07; ctx.lineWidth=.5; ctx.stroke(); }
      }
    }); ctx.globalAlpha=1; requestAnimationFrame(tick);
  }; tick();
};

/* ── AGENT CHAT ── */
const AgentChat = ({ selAgent, setSA }) => {
  const [msgs, setMsgs] = useState([]);
  const [input, setInput] = useState('');
  const [loading, setLoading] = useState(false);
  const bottomRef = useRef(); const ag = AGENTS[selAgent];
  useEffect(()=>{
    setMsgs([{type:'agent',text:'Agent '+ag.n+' active. Ask anything — I respond from my full intelligence DNA. What needs solving today?',time:now()}]);
    g.from('.cp',{y:10,opacity:0,stagger:.03,duration:.45,ease:'power2.out'});
  },[selAgent]);
  useEffect(()=>{ bottomRef.current?.scrollIntoView({behavior:'smooth'}); },[msgs]);
  const send = async () => {
    if(!input.trim()||loading) return;
    const txt=input.trim(); setInput('');
    const h=[...msgs,{type:'user',text:txt,time:now()}];
    setMsgs(h); setLoading(true);
    try {
      const sys='You are '+ag.n+', PhoennixAI '+ag.r+'. DNA: '+ag.dna+'\n\nContext: PhoennixAI (double-N always). Founder: Valerie Wilcox. 22 agents. C&C = Cupcakes and Cocktails keto bakery run by Mayah. Always end with one clear next action. Plain text only — no markdown bold, no triple dashes, no em dashes, no emoji.';
      const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:900,system:sys,messages:h.filter(m=>m.type!=='typing').map(m=>({role:m.type==='user'?'user':'assistant',content:m.text}))})});
      const data=await res.json();
      let reply=(data.content?.filter(b=>b.type==='text').map(b=>b.text).join('\n')||'Unable to connect.').replace(/\*\*/g,'').replace(/---/g,'').replace(/—/g,' - ');
      setMsgs(m=>[...m,{type:'agent',text:reply,time:now()}]);
    } catch { setMsgs(m=>[...m,{type:'agent',text:'Connection error. Check API access.',time:now()}]); }
    setLoading(false);
  };
  return (
    <div style={{display:'flex',flexDirection:'column',height:'calc(100vh - 49px)',overflow:'hidden'}}>
      <div style={{display:'flex',gap:5,flexWrap:'wrap',padding:'.75rem 1.5rem',borderBottom:'.5px solid rgba(255,255,255,.06)',flexShrink:0}}>
        {AGENTS.map((a,i)=>(
          <button key={a.n} className="cp" onClick={()=>setSA(i)} style={{fontSize:11,padding:'3px 11px',borderRadius:100,border:'.5px solid '+(i===selAgent?a.c:'rgba(255,255,255,.08)'),background:i===selAgent?'rgba(91,95,238,.1)':'none',color:i===selAgent?a.c:'var(--t3)',cursor:'pointer',fontWeight:i===selAgent?600:400,transition:'all .15s',fontFamily:'inherit'}}>{a.n}</button>
        ))}
      </div>
      <div style={{flex:1,overflowY:'auto',padding:'1rem 1.5rem',display:'flex',flexDirection:'column',gap:'.75rem',maxWidth:780,width:'100%',alignSelf:'center'}}>
        {msgs.map((m,i)=>(
          <div key={i} className="msg-wrap" style={{display:'flex',flexDirection:'column',alignItems:m.type==='user'?'flex-end':'flex-start',gap:4}}>
            {m.type==='agent'&&<div style={{fontSize:10,color:'var(--t3)',display:'flex',alignItems:'center',gap:5}}><span style={{width:7,height:7,borderRadius:'50%',background:ag.c,boxShadow:'0 0 5px '+ag.c+'80',display:'inline-block'}}></span>{ag.n} — {m.time}</div>}
            <div className={m.type==='user'?'bubble-u':'bubble-a'} style={{maxWidth:'80%'}}>
              {m.text.split('\n').map((ln,j)=><div key={j}>{ln||<br/>}</div>)}
            </div>
            <div className="msg-acts" style={{justifyContent:m.type==='user'?'flex-end':'flex-start'}}>
              {m.type==='user'&&<span style={{fontSize:10,color:'var(--t3)',paddingRight:4}}>{m.time}</span>}
              <button className="act-btn" onClick={()=>navigator.clipboard.writeText(m.text).then(()=>toast('Copied'))}>Copy</button>
              {m.type==='agent'&&<button className="act-btn" onClick={()=>toast('Regenerating...')}>Refresh</button>}
            </div>
          </div>
        ))}
        {loading&&<div className="bubble-a" style={{maxWidth:'80%',display:'flex',gap:5,padding:'.75rem'}}>{[0,1,2].map(i=><span key={i} className="typing-dot" style={{animationDelay:i*.2+'s'}}></span>)}</div>}
        <div ref={bottomRef}/>
      </div>
      <div style={{padding:'.75rem 1.5rem',borderTop:'.5px solid rgba(255,255,255,.06)',display:'flex',gap:'.5rem',maxWidth:780,width:'100%',alignSelf:'center',flexShrink:0}}>
        <textarea value={input} onChange={e=>setInput(e.target.value)} placeholder={'Message '+ag.n+'...'} rows={1} className="field" style={{flex:1,minHeight:44}} onKeyDown={e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();}}} />
        <button onClick={send} disabled={loading} className="btn-primary" style={{padding:'0 1rem',fontSize:13,borderRadius:10,opacity:loading?.5:1}}>Send</button>
      </div>
    </div>
  );
};

            {CONNECTORS.map((cn,i)=><div key={cn.n} onClick={()=>setSC(i)} className={'panel-row '+(sc===i?'active':'')}><div className="panel-ico" style={{fontWeight:700}}>{cn.ico}</div>{cn.n}</div>)}
          </div>
          <div style={{flex:1,overflowY:'auto',padding:'1.5rem'}}>
            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'1.25rem',paddingBottom:'1.25rem',borderBottom:'.5px solid rgba(255,255,255,.06)'}}>
              <div style={{fontSize:17,fontWeight:700,display:'flex',alignItems:'center',gap:'.75rem'}}><div style={{width:36,height:36,borderRadius:9,background:'rgba(255,255,255,.05)',border:'.5px solid rgba(255,255,255,.1)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:16,fontWeight:700}}>{c.ico}</div>{c.n}</div>
              <button onClick={()=>toast('Disconnected from '+c.n)} className="btn-ghost">Disconnect</button>
            </div>
            <p style={{fontSize:13.5,color:'var(--t2)',lineHeight:1.75,marginBottom:'1.25rem'}}>{c.desc}</p>
            <ul style={{listStyle:'none'}}>
              {c.features.map(f=><li key={f} style={{fontSize:13,color:'var(--t2)',lineHeight:1.65,padding:'.375rem 0',borderBottom:'.5px solid rgba(255,255,255,.04)',display:'flex',gap:'.75rem'}}><span style={{width:5,height:5,borderRadius:'50%',background:'#9398ff',flexShrink:0,marginTop:8}}></span>{f}</li>)}
            </ul>
          </div>
        </>
      )}
    </div>
  );
};

/* ── USER MANUAL ── */
const UserManual = () => {
  const [sel,setSel]=useState(0);
  return (
    <div style={{display:'flex',flex:1,height:'calc(100vh - 49px)',overflow:'hidden'}}>
      <div style={{width:220,borderRight:'.5px solid rgba(255,255,255,.06)',padding:'.875rem .625rem',overflowY:'auto',background:'rgba(6,8,18,.65)'}}>
        <div style={{fontSize:11,fontWeight:600,color:'var(--t2)',textTransform:'uppercase',letterSpacing:'.08em',padding:'.25rem .75rem',marginBottom:'.5rem'}}>Contents</div>
        {MANUAL.map((m,i)=><div key={m.t} onClick={()=>setSel(i)} className={'toc-item '+(sel===i?'active':'')}><span style={{fontSize:10,color:'var(--t3)',fontFamily:'JetBrains Mono,monospace',fontWeight:600,width:18,flexShrink:0}}>{String(i+1).padStart(2,'0')}</span>{m.t}</div>)}
      </div>
      <div style={{flex:1,overflowY:'auto',padding:'2.5rem',maxWidth:720}}>
        {MANUAL.map((m,i)=>(
          <div key={m.t} style={{display:sel===i?'block':'none',marginBottom:'3rem'}}>
            <div style={{fontSize:10,fontWeight:700,letterSpacing:'.14em',textTransform:'uppercase',color:'#9398ff',marginBottom:'.5rem'}}>Chapter {String(i+1).padStart(2,'0')}</div>
            <div style={{fontSize:22,fontWeight:700,letterSpacing:'-.4px',marginBottom:'1rem'}}>{m.t}</div>
            {m.body.split('\n\n').map((p,j)=><p key={j} style={{fontSize:14,color:'var(--t2)',lineHeight:1.85,marginBottom:'.875rem'}}>{p}</p>)}
            {m.key&&<div style={{background:'rgba(91,95,238,.08)',border:'.5px solid rgba(91,95,238,.2)',borderLeft:'3px solid #9398ff',borderRadius:'0 10px 10px 0',padding:'.875rem 1.125rem',marginTop:'.875rem',fontSize:13.5,color:'var(--tx)',lineHeight:1.7,fontStyle:'italic'}}>{m.key}</div>}
          </div>
        ))}
      </div>
    </div>
  );
};

/* ── APP ── */
const App = () => {
  const [loggedIn,setLoggedIn]=useState(false);
  const [user,setUser]=useState('Valerie');
  const [view,setView]=useState('home');
  const [selAgent,setSA]=useState(0);
  useEffect(()=>{ initCanvas(); },[]);
  const handleLogin = (em) => {
    const n=em.split('@')[0]; setUser(n.charAt(0).toUpperCase()+n.slice(1));
    setLoggedIn(true);
    setTimeout(()=>{
      g.from('#sidebar',{x:-220,duration:.7,ease:'power3.out'});
      g.from('#main',{opacity:0,duration:.6,delay:.2});
    },50);
  };
  const handleSetView = (v) => {
    const ov=document.getElementById('overlay');
    g.to(ov,{opacity:1,duration:.12,onComplete:()=>{ setView(v); g.to(ov,{opacity:0,duration:.18,delay:.05}); }});
  };
  const TITLES={home:'PhoennixAI',agents:'Agent Roster',chat:'Agent Chat',routines:'Routines',design:'Design',client:'Client Dashboard',customize:'Customize',manual:'User Manual'};
  if(!loggedIn) return <Login onLogin={handleLogin}/>;
  return (
    <div>
      <Sidebar view={view} setView={handleSetView} user={user}/>
      <div id="main">
        <Topbar title={TITLES[view]||'PhoennixAI'}/>
        {view==='home'&&<Home setView={handleSetView} setSA={setSA}/>}
        {view==='agents'&&<Agents setView={handleSetView} setSA={setSA}/>}
        {view==='chat'&&<AgentChat selAgent={selAgent} setSA={setSA}/>}
        {view==='routines'&&<Routines/>}
        {view==='design'&&<Design/>}
        {view==='client'&&<ClientData/>}
        {view==='customize'&&<Customize/>}
        {view==='manual'&&<UserManual/>}
      </div>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
